---
##################################################
# Name: ci-foundry.yaml
# Description: Lint and check Solidity contracts
##################################################

name: Foundry CI

# prettier-ignore
on:  # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - main
      - master
      - trunk
    paths:
      - "contracts/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read
  pull-requests: read
  statuses: write

env:
  # GitHub
  PROJECT: ${{ github.repository }}
  BRANCH_NAME_CURRENT: ${{ github.head_ref || github.ref_name }}
  BRANCH_NAME_DEFAULT: ${{ github.event.repository.default_branch }}

  # Nix
  NIXPKGS_ALLOW_UNFREE: 1

  # SecretSpec
  SECRETSPEC_PROVIDER: env

  # Foundry
  FOUNDRY_PROFILE: ci

defaults:
  run:
    shell: bash

jobs:
  ci:
    name: Check Contracts

    runs-on: ${{ matrix.os }}

    timeout-minutes: 30
    continue-on-error: false

    environment: Testnet

    strategy:
      fail-fast: true
      matrix:
        os:
          - ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-cache-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - id: check_solidity
        name: Check Solidity Contracts
        shell: devenv shell --quiet bash -- -e {0}
        run: |
          solidity-dev --check

      - if: always()
        uses: ./.github/actions/report-status
        with:
          result: ${{ steps.check_solidity.outcome }}
          success-description: "Foundry CI passed: contract checks"
          failure-description: "Foundry CI failed"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          workflow-name: ${{ github.workflow }}
          repository: ${{ github.repository }}
          sha: ${{ github.sha }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
