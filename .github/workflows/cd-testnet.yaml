---
##################################################
# Name: cd-testnet.yaml
# Description: Testnet release pipeline
#
# Triggers:
#   - Manual dispatch with environment = Testnet
#
# Flow:
#   1. check-cache probes the Nix store cache key (lookup-only, ~5s).
#   2. setup-environment only runs on a cache miss (~60 min warm-up).
#   3. pre-release creates a GitHub pre-release tag.
#   4. deploy-juno + deploy-foundry run in parallel.
#   5. update-config patches tresr.yaml and opens a PR.
##################################################

name: Release (Testnet)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: |
          Type "ship it" to confirm the Testnet release.
        required: true
        type: string
      version:
        description: >-
          Version override (e.g. v0.3.0 or 0.3.0).
          Overrides convco auto-bump. Leave blank for automatic versioning.
        required: false
        type: string
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write
  id-token: write
  packages: read
  pull-requests: write
  statuses: write

env:
  NIXPKGS_ALLOW_UNFREE: 1
  SECRETSPEC_PROVIDER: env

defaults:
  run:
    shell: bash

jobs:
  ##################################################
  # Gatekeeper - Check whether the Nix cache already exists
  ##################################################
  check-cache:
    name: Check Cache

    runs-on: ubuntu-latest

    environment: Testnet

    timeout-minutes: 5
    continue-on-error: false

    outputs:
      cache-hit: ${{ steps.nix_cache_lookup.outputs.cache-hit }}

    steps:
      - id: checkout_repository
        name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - id: nix_cache_lookup
        name: Lookup Nix Cache
        uses: actions/cache@v5
        with:
          path: /nix
          key: ${{ runner.os }}-nix-${{ hashFiles('devenv.lock', 'devenv.nix') }}
          lookup-only: true

  ##################################################
  # Warm Cache - Only runs on a cache miss
  ##################################################
  setup-environment:
    name: Setup Environment

    needs: check-cache
    if: needs.check-cache.outputs.cache-hit != 'true'

    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - id: checkout_repository
        name: Checkout Repository
        uses: actions/checkout@v6

      - id: setup_devenv
        name: Setup Devenv
        uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-cache-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skip-push: "false"

  ##################################################
  # Create a pre-release
  ##################################################
  pre-release:
    name: Pre-Release
    needs:
      - check-cache
      - setup-environment

    if: >-
      always() &&
      needs.check-cache.result == 'success'

    runs-on: ubuntu-latest
    environment: Testnet

    timeout-minutes: 120
    continue-on-error: false

    outputs:
      version: ${{ steps.compute_version.outputs.version }}
      tag: ${{ steps.compute_version.outputs.tag }}
      skip: ${{ steps.compute_version.outputs.skip }}

    steps:
      - id: confirm_intent
        name: Confirm intent
        run: |
          if [[ "${{ inputs.confirm }}" != "ship it" ]]; then
            echo "::error::Confirmation must be exactly \"ship it\". Got: \"${{ inputs.confirm }}\""
            exit 1
          fi
          echo "✅ Confirmation accepted"

      - id: checkout_repository
        name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive
          lfs: true

      - id: setup_devenv
        name: Setup Devenv
        uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-cache-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skip-push: "true"

      - id: compute_version
        name: Compute Version
        shell: devenv shell --quiet bash -- -e {0}
        run: |
          RAW_VERSION="${{ inputs.version }}"

          if [[ -n "${RAW_VERSION}" ]]; then
            # Normalize: strip leading 'v', then re-add for canonical form
            SEMVER="${RAW_VERSION#v}"
            if ! [[ "${SEMVER}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+].+)?$ ]]; then
              echo "::error::Invalid version '${RAW_VERSION}'. Expected e.g. 1.2.3 or v1.2.3"
              exit 1
            fi
            NEXT_VERSION="${SEMVER}"
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          else
            # Auto-bump from conventional commits
            NEXT_VERSION=$(convco version --bump 2>/dev/null || echo "")
            if [[ -z "${NEXT_VERSION}" ]]; then
              echo "No bump-worthy commits found (e.g. chore). Skipping release."
              NEXT_VERSION=$(convco version)
              echo "skip=true" >> "${GITHUB_OUTPUT}"
            else
              echo "skip=false" >> "${GITHUB_OUTPUT}"
            fi
          fi

          TAG="v${NEXT_VERSION}"

          # Guard: abort if this tag already exists on remote
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "::error::Tag '${TAG}' already exists on remote. Aborting to prevent overwrite."
            exit 1
          fi

          echo "version=${NEXT_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "Version: ${NEXT_VERSION}, Tag: ${TAG}"

      - id: bump_version
        name: Bump Version Files
        if: steps.compute_version.outputs.skip != 'true'
        shell: devenv shell --quiet bash -- -e {0}
        run: |
          bun run version-set ${{ steps.compute_version.outputs.version }}

      - id: create_release
        name: Create Pre-Release
        if: steps.compute_version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.compute_version.outputs.tag }}"

          # Idempotent: reuse existing pre-release if already created
          if gh release view "${TAG}" > /dev/null 2>&1; then
            echo "Pre-release ${TAG} already exists, reusing for deployment"
          else
            gh release create "${TAG}" \
              --title "Pre-Release ${TAG}" \
              --notes "Release ${TAG}" \
              --prerelease \
              --target "${{ github.sha }}"
          fi

      - id: generate_changelog
        name: Generate Changelog
        if: steps.compute_version.outputs.skip != 'true'
        shell: devenv shell --quiet bash -- -e {0}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SATELLITE_ID: ${{ vars.VITE_SATELLITE_ID }}
          ORBITER_ID: ${{ vars.VITE_ORBITER_ID }}
        run: |
          TAG="${{ steps.compute_version.outputs.tag }}"

          # Fetch the tag created by gh release so convco can see it
          git fetch --tags --force

          # Generate changelog for the latest version (the one we just tagged)
          CHANGELOG=$(convco changelog --max-versions 1 --no-links 2>/dev/null || echo "Release ${TAG}")

          {
            echo "${CHANGELOG}"
            echo ""
            echo "---"
            echo ""
            echo "## :rocket: Testnet Deployment"
            echo ""
            echo "| Resource | ID |"
            echo "|----------|-----|"
            echo "| Satellite | ${SATELLITE_ID} |"
            echo "| Orbiter | ${ORBITER_ID} |"
            echo ""
            echo ":link: [Juno Console](https://console.juno.build/)"
          } > /tmp/changelog.md

          # Update the release with the real changelog
          gh release edit "${TAG}" --notes-file /tmp/changelog.md

          echo "Updated release ${TAG} with changelog"

  ##################################################
  # Deploy to Testnet (Juno)
  ##################################################
  deploy-juno:
    name: Deploy Juno
    needs: pre-release
    if: always() && needs.pre-release.result == 'success' && needs.pre-release.outputs.skip != 'true'

    runs-on: ubuntu-latest
    timeout-minutes: 120
    continue-on-error: false
    environment: Testnet

    outputs:
      oracle_address: ${{ steps.deploy_juno.outputs.oracle_address }}

    steps:
      - id: checkout_repository
        name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
          lfs: true

      - id: setup_devenv
        name: Setup Devenv
        uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-cache-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skip-push: "true"

      - id: deploy_juno
        name: Deploy Juno
        uses: ./.github/actions/deploy-juno
        with:
          mode: staging
          satellite-id: ${{ vars.VITE_SATELLITE_ID }}
          orbiter-id: ${{ vars.VITE_ORBITER_ID }}
          site-url: ${{ vars.VITE_SITE_URL }}
          siwa-provider-id: ${{ vars.VITE_SIWA_PROVIDER_ID }}
          walletconnect-project-id: ${{ secrets.PUBLIC_WALLETCONNECT_PROJECT_ID }}
          version: ${{ needs.pre-release.outputs.tag }}
          version-mode: explicit
          satellite-network: testnet

  ##################################################
  # Deploy Solidity contracts (Testnet)
  # Runs in parallel with deploy-juno.
  ##################################################
  deploy-foundry:
    name: Deploy Contracts
    needs: pre-release
    if: always() && needs.pre-release.result == 'success' && needs.pre-release.outputs.skip != 'true'

    runs-on: ubuntu-latest
    timeout-minutes: 120
    continue-on-error: false
    environment: Testnet

    env:
      FOUNDRY_PROFILE: ${{ vars.FOUNDRY_PROFILE || 'testnet' }}
      FOUNDRY_DISABLE_NIGHTLY_WARNING: 1

    outputs:
      token_address: ${{ steps.resolve_token.outputs.token_address }}
      vault_address: ${{ steps.resolve_vault.outputs.vault_address }}
      faucet_address: ${{ steps.resolve_token.outputs.faucet_address }}
      deployed: ${{ steps.resolve_vault.outputs.deployed }}

    steps:
      - id: checkout_repository
        name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
          lfs: true

      - id: setup_devenv
        name: Setup Devenv
        uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-cache-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skip-push: "true"

      - id: foundry_deploy_setup
        name: Foundry Deploy Setup
        uses: ./.github/actions/foundry-deploy-setup
        with:
          environment: Testnet
          deployer-private-key: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          snowtrace-api-key: ${{ secrets.SNOWTRACE_API_KEY }}

      - id: resolve_token
        name: Resolve Token + Faucet
        uses: ./.github/actions/foundry-resolve-token
        with:
          rpc-url: ${{ steps.foundry_deploy_setup.outputs.RPC_URL }}
          chain-id: ${{ steps.foundry_deploy_setup.outputs.CHAIN_ID }}
          token-address: ${{ steps.foundry_deploy_setup.outputs.TOKEN_ADDRESS }}
          faucet-address: ${{ steps.foundry_deploy_setup.outputs.FAUCET_ADDRESS }}
          deployer-private-key: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          snowtrace-api-key: ${{ secrets.SNOWTRACE_API_KEY }}

      - id: resolve_vault
        name: Resolve Vault
        if: always() && steps.resolve_token.outcome != 'failure'
        uses: ./.github/actions/foundry-resolve-vault
        with:
          network: testnet
          rpc-url: ${{ steps.foundry_deploy_setup.outputs.RPC_URL }}
          chain-id: ${{ steps.foundry_deploy_setup.outputs.CHAIN_ID }}
          token-address: ${{ steps.resolve_token.outputs.token_address }}
          oracle-address: ${{ steps.foundry_deploy_setup.outputs.ORACLE_ADDRESS }}
          admin-address: ${{ steps.foundry_deploy_setup.outputs.ADMIN_ADDRESS }}
          vault-address: ${{ steps.foundry_deploy_setup.outputs.VAULT_ADDRESS }}
          deployer-private-key: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          snowtrace-api-key: ${{ secrets.SNOWTRACE_API_KEY }}

      - id: deploy_summary
        name: Deploy Summary
        if: always()
        uses: ./.github/actions/foundry-deploy-summary
        with:
          network: testnet
          chain-id: ${{ steps.foundry_deploy_setup.outputs.CHAIN_ID }}
          oracle-address: ${{ steps.foundry_deploy_setup.outputs.ORACLE_ADDRESS }}
          admin-address: ${{ steps.foundry_deploy_setup.outputs.ADMIN_ADDRESS }}
          token-address: ${{ steps.resolve_token.outputs.token_address }}
          vault-address: ${{ steps.resolve_vault.outputs.vault_address }}
          workflow-name: cd-testnet

  ##################################################
  # Update config/tresr.yaml with deployed addresses
  ##################################################
  update-config:
    name: Update Config
    needs:
      - deploy-juno
      - deploy-foundry
    if: >-
      always() &&
      needs.deploy-foundry.result == 'success'

    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - id: checkout_repository
        name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          lfs: true

      - id: setup_devenv
        name: Setup Devenv
        uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-cache-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skip-push: "true"

      - id: update_config
        name: Update TRESR Config
        uses: ./.github/actions/update-tresr-config
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          environment: testnet
          base-ref: ${{ github.event.repository.default_branch }}
          oracle-address: ${{ needs.deploy-juno.outputs.oracle_address }}
          token-address: ${{ needs.deploy-foundry.outputs.token_address }}
          vault-address: ${{ needs.deploy-foundry.outputs.vault_address }}
          faucet-address: ${{ needs.deploy-foundry.outputs.faucet_address }}
