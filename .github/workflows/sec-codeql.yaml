---
##################################################
# Name: sec-codeql.yaml
# Description: CodeQL static analysis for security vulnerabilities
#
# Triggers:
#   - Pull request to trunk
#   - Weekly schedule (Sunday 00:00 UTC)
#
# Scans:
#   - JavaScript/TypeScript code
#   - Rust code
#   - GitHub Actions workflows
#
# Results uploaded to GitHub Security tab
##################################################

name: CodeQL

on:
  pull_request:
    branches:
      - trunk

  push:
    branches:
      - trunk

  schedule:
    - cron: "0 0 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read
  actions: write
  statuses: write
  security-events: write

env:
  NIXPKGS_ALLOW_UNFREE: 1
  SECRETSPEC_PROVIDER: env

defaults:
  run:
    shell: bash

jobs:
  ##################################################
  # Run CodeQL analysis per language
  ##################################################

  analyze:
    name: CodeQL Analyze (${{ matrix.language }})

    runs-on: ubuntu-latest

    timeout-minutes: 60
    continue-on-error: false

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: rust
            build-mode: none

    steps:
      - id: checkout_repository
        name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive
          lfs: true

      - id: setup_devenv
        name: Setup Devenv
        uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-cache-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skip-push: "true"

      - id: init_codeql
        name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: .github/codeql-config.yml

      - id: analyze_codeql
        name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

      - id: report_status
        name: Report Status
        if: always()
        uses: ./.github/actions/report-status
        with:
          result: ${{ steps.analyze_codeql.outcome }}
          success-message: "CodeQL analysis passed (${{ matrix.language }})"
          failure-message: "CodeQL analysis failed (${{ matrix.language }})"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          workflow-name: ${{ github.workflow }}
          repository: ${{ github.repository }}
          sha: ${{ github.sha }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
