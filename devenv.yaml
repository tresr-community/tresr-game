---
inputs:
  nixpkgs:
    #url: github:cachix/devenv-nixpkgs/rolling
    url: github:NixOS/nixpkgs/nixpkgs-unstable
  devenv:
    url: github:cachix/devenv/main
    inputs:
      nixpkgs:
        follows: nixpkgs
  fenix:
    url: github:nix-community/fenix
    inputs:
      nixpkgs:
        follows: nixpkgs
  foundry:
    url: github:shazow/foundry.nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  git-hooks:
    url: github:cachix/git-hooks.nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  ic-nix:
    url: github:ninegua/ic-nix/20260217
    flake: false
  rust-overlay:
    url: github:oxalica/rust-overlay/stable
    inputs:
      nixpkgs:
        follows: nixpkgs
allowUnfree: true
clean:
  enabled: false
  keep:
    - EDITOR
    - USER
    - GITHUB_TOKEN
secretspec:
  enable: true
