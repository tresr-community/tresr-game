---
##################################################
# Name: cd-juno-mainnet.yaml
# Description: Deploy Juno to mainnet (hosting + functions + config)
#
# Called by: cd-release.yaml (promote job)
#
##################################################

name: Juno Deploy (Mainnet)

on:
  workflow_call:
    inputs:
      version:
        description: "Release version (e.g. v0.1.0)"
        type: string
        required: false
        default: ""

concurrency:
  group: juno-mainnet-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: read
  pull-requests: read
  statuses: write

env:
  NIXPKGS_ALLOW_UNFREE: 1
  SECRETSPEC_PROVIDER: env
  VITE_SATELLITE_ID: ${{ vars.VITE_SATELLITE_ID }}
  VITE_ASTRO_SITE_URL: ${{ vars.VITE_ASTRO_SITE_URL }}
  VITE_ORBITER_ID: ${{ vars.VITE_ORBITER_ID }}
  VITE_SIWA_PROVIDER_ID: ${{ vars.VITE_SIWA_PROVIDER_ID }}
  PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.PUBLIC_WALLETCONNECT_PROJECT_ID }}

defaults:
  run:
    shell: bash

jobs:
  deploy:
    name: Deploy (Mainnet)

    runs-on: ubuntu-latest

    timeout-minutes: 30
    continue-on-error: false

    environment: Mainnet

    steps:
      - id: check_vars
        name: Check Variables
        env:
          JUNO_TOKEN: ${{ secrets.JUNO_TOKEN }}
        run: |
          REQUIRED_VARS=(
            JUNO_TOKEN
            VITE_ASTRO_SITE_URL
            VITE_SATELLITE_ID
            VITE_ORBITER_ID
            VITE_SIWA_PROVIDER_ID
          )
          for VAR in "${REQUIRED_VARS[@]}";
          do
            if [[ -z "${!VAR}" ]];
            then
              echo "$VAR is not set"
              exit 1
            fi
          done
          echo "All required variables are set"

      - id: checkout_repository
        name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - id: setup_devenv
        name: Setup Devenv
        uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-cache-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - id: cache_bun
        name: Cache Bun
        uses: ./.github/actions/cache-bun

      - id: parse_tag
        name: Parse Release Tag
        if: inputs.version != ''
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - id: set_version_explicit
        name: Set Version (Explicit)
        if: steps.parse_tag.outputs.version != ''
        uses: ./.github/actions/version
        with:
          mode: explicit
          version: ${{ steps.parse_tag.outputs.version }}

      - id: set_version_current
        name: Set Version (Current)
        if: steps.parse_tag.outputs.version == ''
        uses: ./.github/actions/version
        with:
          mode: current

      - id: setup_juno
        name: Setup Juno
        uses: ./.github/actions/setup-juno

      - id: detect_function_changes
        name: Detect Function Changes
        run: |
          # Find the previous tag to diff against
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [[ -z "${PREV_TAG}" ]]; then
            echo "No previous tag found, assuming functions changed"
            echo "changed=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          CHANGED=$(git diff --name-only "${PREV_TAG}"...HEAD -- 'config/*.yaml' 'src/satellite/' || true)
          if [[ -z "${CHANGED}" ]]; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            echo "No function-related changes detected, skipping build/publish"
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
            echo "Function-related changes detected:"
            echo "${CHANGED}"
          fi

      - id: build_functions
        name: Build Juno Functions
        if: steps.detect_function_changes.outputs.changed == 'true'
        shell: devenv shell --quiet bash -- -e {0}
        run: |
          cargo generate-lockfile
          juno functions build

      - id: deploy_hosting
        name: Deploy Hosting
        env:
          JUNO_TOKEN: ${{ secrets.JUNO_TOKEN }}
        shell: devenv shell --quiet bash -- -e {0}
        run: |
          juno hosting deploy --mode production

      - id: apply_config
        name: Apply Configuration
        env:
          JUNO_TOKEN: ${{ secrets.JUNO_TOKEN }}
        shell: devenv shell --quiet bash -- -e {0}
        run: |
          juno config apply --force --mode production

      - id: publish_functions
        name: Publish Functions
        if: steps.detect_function_changes.outputs.changed == 'true'
        env:
          JUNO_TOKEN: ${{ secrets.JUNO_TOKEN }}
        shell: devenv shell --quiet bash -- -e {0}
        run: |
          juno functions publish --mode production
