---
inputs:
  fenix:
    url: github:nix-community/fenix
    inputs:
      nixpkgs:
        follows: nixpkgs
  foundry:
    url: github:shazow/foundry.nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  git-hooks:
    url: github:cachix/git-hooks.nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  ic-nix:
    url: github:ninegua/ic-nix/20260217
    flake: false
  nixpkgs:
    url: github:cachix/devenv-nixpkgs/rolling
  rust-overlay:
    url: github:oxalica/rust-overlay/stable
    inputs:
      nixpkgs:
        follows: nixpkgs
allowUnfree: true
impure: true
clean:
  enabled: false
  keep:
    - EDITOR
    - USER
    - GITHUB_TOKEN
secretspec:
  enable: true
