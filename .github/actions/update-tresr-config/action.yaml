---
name: Update TRESR Config
description: >
  Update tresr.yaml with deployed contract addresses,
  regenerate client config, and create a PR if changed.
  Requires checkout and setup-devenv first.

inputs:
  github-token:
    description: "GitHub token for PR creation"
    required: true
  environment:
    description: "Target environment: testnet or mainnet"
    required: true
  oracle-address:
    description: "Oracle contract address"
    required: false
    default: ""
  token-address:
    description: "TRESR token contract address (testnet only)"
    required: false
    default: ""
  vault-address:
    description: "Vault proxy contract address"
    required: false
    default: ""
  vault-impl-address:
    description: "Vault implementation contract address (changes on upgrade)"
    required: false
    default: ""
  faucet-address:
    description: "Faucet contract address (testnet only)"
    required: false
    default: ""
  base-ref:
    description: "The PR target branch (e.g. main, master, trunk)."
    required: true

outputs:
  changed:
    description: "Whether config files changed"
    value: ${{ steps.check_diff.outputs.changed }}

runs:
  using: composite
  steps:
    - id: switch_branch
      name: Switch to PR branch
      shell: bash
      run: |
        BRANCH="fix/update-${{ inputs.environment }}-contract-address"
        BASE_REF="${{ inputs.base-ref }}"

        # Fetch the latest remote HEAD for the base branch
        git fetch origin "${BASE_REF}"

        # Reset to the base ref
        git reset --hard "origin/${BASE_REF}"
        git checkout -B "${BRANCH}"

    - id: update_yaml
      name: Update tresr.yaml
      shell: bash
      run: |
        CONFIG="config/tresr.yaml"
        ENV="${{ inputs.environment }}"
        ORACLE="${{ inputs.oracle-address }}"
        TOKEN="${{ inputs.token-address }}"
        VAULT="${{ inputs.vault-address }}"
        VAULT_IMPL="${{ inputs.vault-impl-address }}"
        FAUCET="${{ inputs.faucet-address }}"
        ZERO="0x0000000000000000000000000000000000000000"

        # sed+verify pattern: update a key within the correct network block
        yaml_set() {
          local key="$1" value="$2"
          if [[ "$ENV" == "testnet" ]]; then
            sed -i "/testnet:/,/mainnet:/ s|${key}: .*|${key}: \"${value}\"|" "$CONFIG"
            actual=$(yq -r ".client.blockchain.avalanche.testnet.${key}" "$CONFIG" 2>/dev/null || echo "")
          else
            sed -i "/mainnet:/,\$  s|${key}: .*|${key}: \"${value}\"|" "$CONFIG"
            actual=$(yq -r ".client.blockchain.avalanche.mainnet.${key}" "$CONFIG" 2>/dev/null || echo "")
          fi
          if [[ "$actual" != "$value" ]]; then
            echo "::error::YAML update failed: ${key} is '${actual}' expected '${value}'"
            exit 1
          fi
          echo "✓ ${key} = ${value}"
        }

        [[ -n "$ORACLE" && "$ORACLE" != "$ZERO" ]] && yaml_set oracle_address "$ORACLE"
        [[ -n "$TOKEN"  && "$TOKEN"  != "$ZERO" ]] && yaml_set tresr_token_contract "$TOKEN"
        [[ -n "$VAULT"  && "$VAULT"  != "$ZERO" ]] && yaml_set proxy_contract "$VAULT"
        [[ -n "$VAULT_IMPL" && "$VAULT_IMPL" != "$ZERO" ]] && yaml_set vault_contract "$VAULT_IMPL"
        [[ -n "$FAUCET" && "$FAUCET" != "$ZERO" ]] && yaml_set faucet_contract "$FAUCET"

    # Run client-config with --stage so it:
    #   1. Regenerates all derived config files from tresr.yaml
    #   2. Restores LFS-smudged files by only staging the files it actually wrote
    #   3. git-adds exactly those files
    - id: regenerate_config
      name: Regenerate Client Config
      shell: devenv shell --quiet bash -- -e {0}
      run: |
        bun install
        bun run client-config --stage

    - id: check_diff
      name: Check for Changes
      shell: bash
      run: |
        # Check only the staged index — client-config --stage already added the right files.
        if git diff --cached --quiet; then
          echo "changed=false" >> "$GITHUB_OUTPUT"
          echo "No config changes detected — nothing to commit"
        else
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "Staged changes:"
          git diff --cached --stat
        fi

    # Disable pre-commit hooks so the bot commit isn't blocked by linters.
    - id: remove_hooks
      name: Remove Pre-commit Hooks
      if: steps.check_diff.outputs.changed == 'true'
      shell: bash
      run: rm -rf .git/hooks

    # Push staged changes (from client-config --stage) directly using git + gh.
    # This avoids third-party actions that do "git add -A", which picks up
    # LFS-inconsistent font files and causes checkout to fail.
    - id: create_pr
      name: Create Config PR
      if: steps.check_diff.outputs.changed == 'true'
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      shell: bash
      run: |
        BRANCH="fix/update-${{ inputs.environment }}-contract-address"
        TITLE="fix: update ${{ inputs.environment }} contract addresses"
        BASE_REF="${{ inputs.base-ref }}"

        git config user.name  "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        # Commit only what client-config --stage staged — no git add -A
        git commit \
          --signoff \
          -m "${TITLE}"

        # Force-push so re-runs overwrite any stale branch
        git push --force origin "${BRANCH}"

        # Idempotent: create the PR or update it if it already exists
        EXISTING=$(gh pr list \
          --head "${BRANCH}" \
          --base "${BASE_REF}" \
          --state open \
          --json number \
          --jq '.[0].number' 2>/dev/null || echo "")

        ZERO="0x0000000000000000000000000000000000000000"
        _fmt() {
          local val="$1"
          if [[ -z "$val" || "$val" == "$ZERO" || "$val" == "null" ]]; then
            echo "_not deployed_"
          else
            echo "\`${val}\`"
          fi
        }

        ORACLE_FMT=$(_fmt "${{ inputs.oracle-address }}")
        TOKEN_FMT=$(_fmt  "${{ inputs.token-address }}")
        VAULT_FMT=$(_fmt  "${{ inputs.vault-address }}")
        VAULT_IMPL_FMT=$(_fmt "${{ inputs.vault-impl-address }}")
        FAUCET_FMT=$(_fmt "${{ inputs.faucet-address }}")

        BODY=$(cat <<EOF
        Auto-generated after ${{ inputs.environment }} contract deployment.

        | Address | Value |
        |---------|-------|
        | Oracle  | ${ORACLE_FMT} |
        | Token   | ${TOKEN_FMT} |
        | Vault (proxy)  | ${VAULT_FMT} |
        | Vault (impl)   | ${VAULT_IMPL_FMT} |
        | Faucet  | ${FAUCET_FMT} |
        EOF
        )

        if [[ -n "${EXISTING}" ]]; then
          echo "PR #${EXISTING} already exists — updating body"
          gh pr edit "${EXISTING}" --body "${BODY}"
        else
          gh pr create \
            --head "${BRANCH}" \
            --base "${BASE_REF}" \
            --title "${TITLE}" \
            --body "${BODY}" \
            --label "contracts" \
            --label "dependencies" \
            --assignee "MAHDTech" \
            --reviewer "MAHDTech"
        fi

        # Enable auto-merge so the PR merges automatically once CI passes.
        # Requires "Allow auto-merge" to be enabled in repo Settings → General.
        gh pr merge "${BRANCH}" --auto --squash || true
