---
##################################################
# Name: cd-release.yaml
# Description: Single entrypoint for all releases
#
# Triggers:
#   - Push to trunk → Create pre-release (automatic)
#   - Manual dispatch → Create pre-release (Testnet) or promote to release (Mainnet)
#
# Flow:
#   1. Compute next version via convco (or use version_override if provided)
#   2. Bump version in package.json, manifest.json, Cargo.toml
#   3. Testnet: Tag as v{version}, create pre-release
#      → calls cd-juno-testnet.yaml (workflow_call)
#      → calls cd-foundry-testnet.yaml (workflow_call) with oracle from Juno
#      → updates config/tresr.yaml via PR if addresses changed
#   4. Mainnet: Promote existing pre-release tag to release
#      → calls cd-juno-mainnet.yaml (workflow_call)
#      → calls cd-foundry-mainnet.yaml (workflow_call) with oracle from Juno
#      → updates config/tresr.yaml via PR if addresses changed
##################################################

name: Release

on:
  push:
    branches:
      - trunk

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - Testnet
          - Mainnet
        default: Testnet
      release_tag:
        description: "Tag to promote (Mainnet only, e.g. v0.2.0)"
        required: false
        type: string
        default: ""
      version_override:
        description: "Force a specific version (Testnet only, e.g. 0.3.0 or v0.3.0)"
        required: false
        type: string
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write
  packages: read
  pull-requests: write
  statuses: write

env:
  NIXPKGS_ALLOW_UNFREE: 1
  SECRETSPEC_PROVIDER: env

defaults:
  run:
    shell: bash

jobs:
  ##################################################
  # Create a pre-release
  # Triggers: push to trunk (auto) OR manual with Testnet
  ##################################################

  pre-release:
    name: Pre-Release

    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'Testnet')

    runs-on: ubuntu-latest
    environment: Testnet

    timeout-minutes: 60
    continue-on-error: false

    outputs:
      version: ${{ steps.compute_version.outputs.version }}
      tag: ${{ steps.compute_version.outputs.tag }}
      skip: ${{ steps.compute_version.outputs.skip }}

    steps:
      - id: checkout_repository
        name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - id: free_disk_space
        name: Free Disk Space
        uses: ./.github/actions/free-disk-space

      - id: setup_devenv
        name: Setup Devenv
        uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - id: compute_version
        name: Compute Version
        shell: devenv shell --quiet bash -- -e {0}
        run: |
          OVERRIDE="${{ github.event.inputs.version_override }}"

          if [[ -n "${OVERRIDE}" ]]; then
            # Strip leading 'v' if present and validate
            NEXT_VERSION="${OVERRIDE#v}"

            if ! [[ "${NEXT_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
              echo "::error::Invalid version format: '${OVERRIDE}'. Expected semver (e.g. 0.3.0 or v0.3.0)"
              exit 1
            fi

            echo "Using manual version override: ${NEXT_VERSION}"
          else
            # Get next version from conventional commits
            NEXT_VERSION=$(convco version --bump 2>/dev/null || echo "")

            if [[ -z "${NEXT_VERSION}" ]]; then
              echo "No conventional commits found to bump version"
              NEXT_VERSION=$(convco version)
            fi
          fi

          TAG="v${NEXT_VERSION}"

          # Check if tag already exists
          if git tag --list | grep -q "^${TAG}$"; then
            echo "Tag ${TAG} already exists, skipping release"
            echo "skip=true" >> "${GITHUB_OUTPUT}"
          else
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          fi

          echo "version=${NEXT_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "Version: ${NEXT_VERSION}, Tag: ${TAG}"

      - id: bump_version
        name: Bump Version Files
        if: steps.compute_version.outputs.skip != 'true'
        shell: devenv shell --quiet bash -- -e {0}
        run: |
          bun run version-set ${{ steps.compute_version.outputs.version }}

      - id: create_release
        name: Create Pre-Release
        if: steps.compute_version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.compute_version.outputs.tag }}" \
            --title "Pre-Release ${{ steps.compute_version.outputs.tag }}" \
            --notes "Release ${{ steps.compute_version.outputs.tag }}" \
            --prerelease \
            --target "${{ github.sha }}"

      - id: generate_changelog
        name: Generate Changelog
        if: steps.compute_version.outputs.skip != 'true'
        shell: devenv shell --quiet bash -- -e {0}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SATELLITE_ID: ${{ vars.VITE_SATELLITE_ID }}
          ORBITER_ID: ${{ vars.VITE_ORBITER_ID }}
        run: |
          TAG="${{ steps.compute_version.outputs.tag }}"

          # Fetch the tag created by gh release so convco can see it
          git fetch --tags --force

          # Generate changelog for the latest version (the one we just tagged)
          CHANGELOG=$(convco changelog --max-versions 1 --no-links 2>/dev/null || echo "Release ${TAG}")

          {
            echo "${CHANGELOG}"
            echo ""
            echo "---"
            echo ""
            echo "## :rocket: Testnet Deployment"
            echo ""
            echo "| Resource | ID |"
            echo "|----------|-----|"
            echo "| Satellite | ${SATELLITE_ID} |"
            echo "| Orbiter | ${ORBITER_ID} |"
            echo ""
            echo ":link: [Juno Console](https://console.juno.build/)"
          } > /tmp/changelog.md

          # Update the release with the real changelog
          gh release edit "${TAG}" --notes-file /tmp/changelog.md

          echo "Updated release ${TAG} with changelog"

  ##################################################
  # Deploy to Testnet (Juno)
  # Calls cd-juno-testnet.yaml via workflow_call
  # Outputs oracle_address for Foundry
  #
  # NOTE: No skip gate — Juno must always redeploy
  # so config-only merges (2nd pass) pick up new
  # contract addresses in config/tresr.yaml.
  ##################################################

  deploy-juno-testnet:
    name: Deploy Juno (Testnet)
    needs: pre-release
    uses: ./.github/workflows/cd-juno-testnet.yaml
    with:
      version: ${{ needs.pre-release.outputs.tag }}
    secrets: inherit

  ##################################################
  # Deploy Solidity contracts (Testnet)
  # Calls cd-foundry.yaml via workflow_call
  # Passes oracle_address from Juno deploy
  ##################################################

  deploy-foundry-testnet:
    name: Deploy Contracts (Testnet)
    needs: [pre-release, deploy-juno-testnet]
    if: needs.pre-release.outputs.skip != 'true'
    uses: ./.github/workflows/cd-foundry-testnet.yaml
    with:
      oracle_address: ${{ needs.deploy-juno-testnet.outputs.oracle_address }}
    secrets: inherit

  ##################################################
  # Update config/tresr.yaml with deployed addresses
  # Creates a PR via peter-evans/create-pull-request
  ##################################################

  update-config:
    name: Update Config
    needs: [pre-release, deploy-juno-testnet, deploy-foundry-testnet]
    if: >-
      always() &&
      needs.pre-release.outputs.skip != 'true' &&
      needs.deploy-foundry-testnet.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - id: checkout_repository
        name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: trunk

      - id: update_yaml
        name: Update tresr.yaml
        run: |
          CONFIG="config/tresr.yaml"
          ORACLE="${{ needs.deploy-juno-testnet.outputs.oracle_address }}"
          TOKEN="${{ needs.deploy-foundry-testnet.outputs.token_address }}"
          VAULT="${{ needs.deploy-foundry-testnet.outputs.vault_address }}"
          FAUCET="${{ needs.deploy-foundry-testnet.outputs.faucet_address }}"
          ZERO="0x0000000000000000000000000000000000000000"

          # sed+verify pattern from solidity-dev.sh
          yaml_set() {
            local key="$1" value="$2"
            sed -i "/testnet:/,/mainnet:/ s|${key}: .*|${key}: \"${value}\"|" "$CONFIG"
            actual=$(yq -r ".client.blockchain.avalanche.testnet.${key}" "$CONFIG" 2>/dev/null || echo "")
            if [[ "$actual" != "$value" ]]; then
              echo "::error::YAML update failed: ${key} is '${actual}' expected '${value}'"
              exit 1
            fi
            echo "✓ ${key} = ${value}"
          }

          [[ -n "$ORACLE" && "$ORACLE" != "$ZERO" ]] && yaml_set oracle_address "$ORACLE"
          [[ -n "$TOKEN"  && "$TOKEN"  != "$ZERO" ]] && yaml_set tresr_token_contract "$TOKEN"
          [[ -n "$VAULT"  && "$VAULT"  != "$ZERO" ]] && yaml_set vault_contract "$VAULT"
          [[ -n "$FAUCET" && "$FAUCET" != "$ZERO" ]] && yaml_set faucet_contract "$FAUCET"

      - id: check_diff
        name: Check for Changes
        run: |
          if git diff --quiet config/tresr.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No config changes detected"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Config changes detected:"
            git diff config/tresr.yaml
          fi

      - id: create_pr
        name: Create Config PR
        if: steps.check_diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update testnet contract addresses"
          title: "chore: update testnet contract addresses"
          body: |
            Auto-generated after contract deployment.

            | Address | Value |
            |---------|-------|
            | Oracle | `${{ needs.deploy-juno-testnet.outputs.oracle_address }}` |
            | Token | `${{ needs.deploy-foundry-testnet.outputs.token_address }}` |
            | Vault | `${{ needs.deploy-foundry-testnet.outputs.vault_address }}` |
            | Faucet | `${{ needs.deploy-foundry-testnet.outputs.faucet_address }}` |
          branch: "chore/update-testnet-contract-address"
          base: trunk
          labels: "contracts,dependencies"
          assignees: "MAHDTech"
          reviewers: "MAHDTech"
          draft: false
          signoff: true
          delete-branch: true
          sign-commits: true

  ##################################################
  # Promote a pre-release to release (mainnet)
  # Triggers: manual dispatch with Mainnet
  # Requires GitHub Environment "Mainnet" approvers
  ##################################################

  promote:
    name: Promote to Release (Mainnet)

    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'Mainnet'

    runs-on: ubuntu-latest
    environment: Mainnet

    timeout-minutes: 60
    continue-on-error: false

    outputs:
      tag: ${{ steps.validate_tag.outputs.tag }}

    steps:
      - id: checkout_repository
        name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: free_disk_space
        name: Free Disk Space
        uses: ./.github/actions/free-disk-space

      - id: setup_devenv
        name: Setup Devenv
        uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - id: validate_tag
        name: Validate Release Tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          if [[ -n "${RELEASE_TAG}" ]]; then
            # User specified a tag — use it directly
            TAG="${RELEASE_TAG}"
            echo "Using provided release tag: ${TAG}"
          else
            # Auto-discover the latest pre-release
            TAG=$(gh release list --json tagName,isPrerelease \
              --jq '[.[] | select(.isPrerelease==true)] | first | .tagName' 2>/dev/null || echo "")

            if [[ -z "${TAG}" || "${TAG}" == "null" ]]; then
              echo "::error::No pre-releases found. Create one first via a Testnet deployment."
              exit 1
            fi
            echo "Auto-discovered latest pre-release: ${TAG}"
          fi

          # Verify the release exists and IS a pre-release
          RELEASE_INFO=$(gh release view "${TAG}" --json isPrerelease,tagName 2>&1) || {
            echo "::error::Release '${TAG}' not found"
            exit 1
          }

          IS_PRERELEASE=$(echo "${RELEASE_INFO}" | jq -r '.isPrerelease')
          if [[ "${IS_PRERELEASE}" != "true" ]]; then
            echo "::error::Release '${TAG}' has already been promoted to a full release."
            echo "::error::If you want to promote a specific pre-release, enter the tag (e.g. v0.2.3)."
            exit 1
          fi

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "Validated: ${TAG} is a pre-release, ready to promote"

      - id: generate_changelog
        name: Generate Release Changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SATELLITE_ID: ${{ vars.VITE_SATELLITE_ID }}
          ORBITER_ID: ${{ vars.VITE_ORBITER_ID }}
        run: |
          TAG="${{ steps.validate_tag.outputs.tag }}"

          # Get existing release body (has changelog + testnet table)
          EXISTING=$(gh release view "${TAG}" --json body -q '.body')

          {
            echo "${EXISTING}"
            echo ""
            echo "## :globe_with_meridians: Mainnet Deployment"
            echo ""
            echo "| Resource | ID |"
            echo "|----------|-----|"
            echo "| Satellite | ${SATELLITE_ID} |"
            echo "| Orbiter | ${ORBITER_ID} |"
            echo ""
            echo ":link: [Juno Console](https://console.juno.build/)"
          } > /tmp/changelog.md

          echo "Generated release changelog with mainnet deployment for ${TAG}"

      - id: promote_release
        name: Promote Pre-Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ steps.validate_tag.outputs.tag }}" \
            --prerelease=false \
            --title "Release ${{ steps.validate_tag.outputs.tag }}" \
            --notes-file /tmp/changelog.md

          echo "Promoted ${{ steps.validate_tag.outputs.tag }} to release"

  ##################################################
  # Deploy to Mainnet (Juno)
  # Calls cd-juno-mainnet.yaml via workflow_call
  ##################################################

  deploy-juno-mainnet:
    name: Deploy Juno (Mainnet)
    needs: promote
    uses: ./.github/workflows/cd-juno-mainnet.yaml
    with:
      version: ${{ needs.promote.outputs.tag }}
    secrets: inherit

  ##################################################
  # Deploy Solidity contracts (Mainnet)
  # Calls cd-foundry-mainnet.yaml via workflow_call
  ##################################################

  deploy-foundry-mainnet:
    name: Deploy Contracts (Mainnet)
    needs: [promote, deploy-juno-mainnet]
    uses: ./.github/workflows/cd-foundry-mainnet.yaml
    with:
      oracle_address: ${{ needs.deploy-juno-mainnet.outputs.oracle_address }}
    secrets: inherit

  ##################################################
  # Update config/tresr.yaml with mainnet addresses
  # Creates a PR via peter-evans/create-pull-request
  ##################################################

  update-config-mainnet:
    name: Update Config (Mainnet)
    needs: [promote, deploy-juno-mainnet, deploy-foundry-mainnet]
    if: >-
      always() &&
      needs.deploy-foundry-mainnet.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - id: checkout_repository
        name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: trunk

      - id: update_yaml
        name: Update tresr.yaml
        run: |
          CONFIG="config/tresr.yaml"
          ORACLE="${{ needs.deploy-juno-mainnet.outputs.oracle_address }}"
          VAULT="${{ needs.deploy-foundry-mainnet.outputs.vault_address }}"
          ZERO="0x0000000000000000000000000000000000000000"

          # sed+verify pattern — scoped to mainnet section
          yaml_set() {
            local key="$1" value="$2"
            sed -i "/mainnet:/,\$  s|${key}: .*|${key}: \"${value}\"|" "$CONFIG"
            actual=$(yq -r ".client.blockchain.avalanche.mainnet.${key}" "$CONFIG" 2>/dev/null || echo "")
            if [[ "$actual" != "$value" ]]; then
              echo "::error::YAML update failed: ${key} is '${actual}' expected '${value}'"
              exit 1
            fi
            echo "✓ ${key} = ${value}"
          }

          [[ -n "$ORACLE" && "$ORACLE" != "$ZERO" ]] && yaml_set oracle_address "$ORACLE"
          [[ -n "$VAULT"  && "$VAULT"  != "$ZERO" ]] && yaml_set vault_contract "$VAULT"

      - id: check_diff
        name: Check for Changes
        run: |
          if git diff --quiet config/tresr.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No config changes detected"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Config changes detected:"
            git diff config/tresr.yaml
          fi

      - id: create_pr
        name: Create Config PR
        if: steps.check_diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update mainnet contract addresses"
          title: "chore: update mainnet contract addresses"
          body: |
            Auto-generated after mainnet contract deployment.

            | Address | Value |
            |---------|-------|
            | Oracle | `${{ needs.deploy-juno-mainnet.outputs.oracle_address }}` |
            | Vault | `${{ needs.deploy-foundry-mainnet.outputs.vault_address }}` |
          branch: "chore/update-mainnet-contract-address"
          base: trunk
          labels: "contracts,dependencies"
          assignees: "MAHDTech"
          reviewers: "MAHDTech"
          draft: false
          signoff: true
          delete-branch: true
          sign-commits: true
