##################################################
# Name: bootstrap.yaml
# Description: First-time environment bootstrap
#
# Runs ONCE per environment to solve the oracle → vault → config dependency
# triangle. Executes sequentially:
#
#   guard → warm cache → Deploy Juno (pass 1) → Deploy Contracts
#   → Patch config + Re-deploy Juno (pass 2) → Open config PR
#
# Guards:
#   - Aborts if any contract address in config is already non-zero.
#   - Manual dispatch only — never triggered automatically.
#
# After this runs successfully, use cd.yaml for all subsequent releases.
##################################################

name: Bootstrap Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - Testnet
          - Mainnet
      confirm:
        description: >-
          Type "bootstrap" to confirm. The workflow aborts if any contract
          address in config is already non-zero.
        required: true
        type: string

concurrency:
  group: bootstrap-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  packages: read
  pull-requests: write
  statuses: write
  actions: write

env:
  NIXPKGS_ALLOW_UNFREE: 1
  SECRETSPEC_PROVIDER: env
  FOUNDRY_DISABLE_NIGHTLY_WARNING: 1

defaults:
  run:
    shell: bash

jobs:
  ##################################################
  # Guard — abort if env is not fully zeroed.
  ##################################################
  guard:
    name: Bootstrap Guard

    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Confirm intent
        run: |
          if [[ "${{ inputs.confirm }}" != "bootstrap" ]]; then
            echo "::error::Confirmation must be exactly \"bootstrap\". Got: \"${{ inputs.confirm }}\""
            exit 1
          fi
          echo "✅ Confirmation accepted"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Verify all addresses are zero (safe to bootstrap)
        run: |
          NETWORK=$(echo "${{ inputs.environment }}" | tr '[:upper:]' '[:lower:]')
          CONFIG="config/tresr.yaml"
          ZERO="0x0000000000000000000000000000000000000000"
          ABORT=0

          check_zero() {
            local key="$1"
            local val
            val=$(yq ".client.blockchain.avalanche.${NETWORK}.${key}" "$CONFIG" 2>/dev/null || echo "")
            if [[ -n "$val" && "$val" != "null" && "$val" != "$ZERO" ]]; then
              echo "::error::${key} is already set to ${val} — not a fresh environment."
              ABORT=$((ABORT + 1))
            else
              echo "  ✅ ${key} = zero"
            fi
          }

          echo "Checking $NETWORK addresses in $CONFIG …"
          check_zero oracle_address
          check_zero tresr_token_contract
          check_zero vault_contract
          check_zero faucet_contract

          if [[ $ABORT -gt 0 ]]; then
            echo ""
            echo "::error::Bootstrap aborted — $ABORT address(es) are already deployed."
            echo "Use cd.yaml for subsequent releases."
            exit 1
          fi

          echo ""
          echo "✅ All addresses are zero — safe to proceed"

  ##################################################
  # Warm devenv / Nix cache
  ##################################################
  check-cache:
    name: Check Cache
    needs: guard

    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      cache-hit: ${{ steps.nix_cache_lookup.outputs.cache-hit }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - id: nix_cache_lookup
        name: Lookup Nix Cache
        uses: actions/cache@v5
        with:
          path: /nix
          key: >-
            ${{ runner.os }}-nix-${{ hashFiles('devenv.lock', 'devenv.nix') }}
          lookup-only: true

  setup-environment:
    name: Setup Environment
    needs: check-cache
    if: needs.check-cache.outputs.cache-hit != 'true'

    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-cache-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

  ##################################################
  # Deploy Juno — Pass 1 (no vault address yet).
  # Two conditional jobs because GitHub does not allow
  # expressions in `uses:` for reusable workflow calls.
  # Exactly one of these runs depending on the environment.
  ##################################################
  deploy-juno-testnet:
    name: Deploy Juno Testnet (Pass 1)
    if: >-
      always() &&
      inputs.environment == 'Testnet' &&
      needs.check-cache.result == 'success' &&
      (needs.setup-environment.result == 'success' ||
       needs.setup-environment.result == 'skipped')
    needs:
      - check-cache
      - setup-environment
    uses: ./.github/workflows/cd-juno-testnet.yaml
    secrets: inherit

  deploy-juno-mainnet:
    name: Deploy Juno Mainnet (Pass 1)
    if: >-
      always() &&
      inputs.environment == 'Mainnet' &&
      needs.check-cache.result == 'success' &&
      (needs.setup-environment.result == 'success' ||
       needs.setup-environment.result == 'skipped')
    needs:
      - check-cache
      - setup-environment
    uses: ./.github/workflows/cd-juno-mainnet.yaml
    secrets: inherit

  # Obtain the oracle address from whichever Juno job ran.
  obtain-oracle:
    name: Obtain Oracle Address
    needs:
      - deploy-juno-testnet
      - deploy-juno-mainnet
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      oracle_address: ${{ steps.pick.outputs.oracle_address }}
    steps:
      - id: pick
        name: Pick Oracle
        run: |
          TESTNET="${{ needs.deploy-juno-testnet.outputs.oracle_address }}"
          MAINNET="${{ needs.deploy-juno-mainnet.outputs.oracle_address }}"
          ORACLE_ADDR="${TESTNET:-$MAINNET}"
          if [[ -z "$ORACLE_ADDR" ]]; then
            echo "::error::No oracle address from either Juno deploy job"
            exit 1
          fi
          echo "oracle_address=${ORACLE_ADDR}" >> "$GITHUB_OUTPUT"
          echo "✅ Oracle: ${ORACLE_ADDR}"

  ##################################################
  # Deploy Contracts — Token + Faucet + Vault.
  # Oracle is injected from deploy-juno output
  ##################################################
  deploy-contracts:
    name: Deploy Contracts

    needs: obtain-oracle

    if: ${{ !cancelled() && needs.obtain-oracle.result == 'success' }}

    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: false

    environment: ${{ inputs.environment }}

    env:
      FOUNDRY_PROFILE: >-
        ${{ vars.FOUNDRY_PROFILE ||
            (inputs.environment == 'Mainnet' && 'mainnet' || 'testnet') }}

    outputs:
      token_address: ${{ steps.resolve_token.outputs.token_address }}
      vault_address: ${{ steps.resolve_vault.outputs.vault_address }}
      faucet_address: ${{ steps.resolve_token.outputs.faucet_address }}

    steps:
      - uses: actions/checkout@v4

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false

      - uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-cache-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - id: foundry_deploy_setup
        name: Resolve Environment
        uses: ./.github/actions/foundry-deploy-setup
        with:
          environment: ${{ inputs.environment }}
          # ↓ Oracle comes directly from Juno — no config PR needed between jobs.
          oracle-address: ${{ needs.obtain-oracle.outputs.oracle_address }}
          deployer-private-key: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          snowtrace-api-key: ${{ secrets.SNOWTRACE_API_KEY }}

      - id: resolve_token
        name: Deploy Token + Faucet
        if: inputs.environment == 'Testnet'
        uses: ./.github/actions/foundry-resolve-token
        with:
          rpc-url: ${{ steps.foundry_deploy_setup.outputs.RPC_URL }}
          chain-id: ${{ steps.foundry_deploy_setup.outputs.CHAIN_ID }}
          token-address: ${{ steps.foundry_deploy_setup.outputs.TOKEN_ADDRESS }}
          faucet-address: ${{ steps.foundry_deploy_setup.outputs.FAUCET_ADDRESS }}
          deployer-private-key: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          snowtrace-api-key: ${{ secrets.SNOWTRACE_API_KEY }}

      - id: resolve_vault
        name: Deploy Vault
        uses: ./.github/actions/foundry-resolve-vault
        with:
          network: ${{ steps.foundry_deploy_setup.outputs.network }}
          rpc-url: ${{ steps.foundry_deploy_setup.outputs.RPC_URL }}
          chain-id: ${{ steps.foundry_deploy_setup.outputs.CHAIN_ID }}
          oracle-address: ${{ steps.foundry_deploy_setup.outputs.ORACLE_ADDRESS }}
          admin-address: ${{ steps.foundry_deploy_setup.outputs.ADMIN_ADDRESS }}
          token-address: >-
            ${{ steps.resolve_token.outputs.token_address ||
                steps.foundry_deploy_setup.outputs.TOKEN_ADDRESS }}
          vault-address: ${{ steps.foundry_deploy_setup.outputs.VAULT_ADDRESS }}
          deployer-private-key: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          snowtrace-api-key: ${{ secrets.SNOWTRACE_API_KEY }}

      - name: Contract Deploy Summary
        if: always()
        run: |
          {
            echo "## 📜 Contract Deployment"
            echo ""
            echo "| Contract | Address |"
            echo "|----------|---------|"
            echo "| Oracle   | \`${{ needs.obtain-oracle.outputs.oracle_address }}\` |"
            echo "| Token    | \`${{ steps.resolve_token.outputs.token_address }}\` |"
            echo "| Vault    | \`${{ steps.resolve_vault.outputs.vault_address }}\` |"
            echo "| Faucet   | \`${{ steps.resolve_token.outputs.faucet_address }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  ##################################################
  # Patch tresr.yaml, rebuild, re-deploy Juno (pass 2),
  # and open the config PR to persist addresses.
  ##################################################
  update-and-redeploy:
    name: Update Config + Re-deploy Juno (Pass 2)

    needs:
      - obtain-oracle
      - deploy-contracts

    if: ${{ !cancelled() && needs.obtain-oracle.result == 'success' && needs.deploy-contracts.result == 'success' }}

    runs-on: ubuntu-latest
    timeout-minutes: 120
    continue-on-error: false

    environment: ${{ inputs.environment }}

    env:
      VITE_STAGING_SATELLITE_ID: ${{ vars.VITE_SATELLITE_ID }}
      VITE_STAGING_ORBITER_ID: ${{ vars.VITE_ORBITER_ID }}
      VITE_ASTRO_SITE_URL: ${{ vars.VITE_ASTRO_SITE_URL }}
      VITE_SIWA_PROVIDER_ID: ${{ vars.VITE_SIWA_PROVIDER_ID }}
      PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.PUBLIC_WALLETCONNECT_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history for the PR diff to be sensible.
          fetch-depth: 0

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false

      - uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-cache-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # ── Step 1: Patch tresr.yaml in the workspace ───────────────────────────
      - id: update_config
        name: Patch tresr.yaml
        uses: ./.github/actions/update-tresr-config
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          environment: ${{ inputs.environment == 'Testnet' && 'testnet' || 'mainnet' }}
          oracle-address: ${{ needs.obtain-oracle.outputs.oracle_address }}
          token-address: ${{ needs.deploy-contracts.outputs.token_address }}
          vault-address: ${{ needs.deploy-contracts.outputs.vault_address }}
          faucet-address: ${{ needs.deploy-contracts.outputs.faucet_address }}

      # ── Step 2: Rebuild with vault address now in tresr.yaml ────────────────
      - name: Build (with vault)
        if: steps.update_config.outputs.changed == 'true'
        shell: devenv shell --quiet bash -- -e {0}
        run: bun run build

      # ── Step 3: Re-deploy hosting so satellite is aware of vault_contract ───
      - name: Re-deploy Hosting (Pass 2 — with vault)
        if: steps.update_config.outputs.changed == 'true'
        shell: devenv shell --quiet bash -- -e {0}
        env:
          JUNO_TOKEN: ${{ secrets.JUNO_TOKEN }}
        run: |
          JUNO_TOKEN="$JUNO_TOKEN" juno deploy \
            --satellite-id "$VITE_STAGING_SATELLITE_ID"

      - name: Bootstrap Complete Summary
        run: |
          {
            echo "## 🎉 Bootstrap Complete — ${{ inputs.environment }}"
            echo ""
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "| Oracle  | \`${{ needs.obtain-oracle.outputs.oracle_address }}\` |"
            echo "| Token   | \`${{ needs.deploy-contracts.outputs.token_address }}\` |"
            echo "| Vault   | \`${{ needs.deploy-contracts.outputs.vault_address }}\` |"
            echo "| Faucet  | \`${{ needs.deploy-contracts.outputs.faucet_address }}\` |"
            echo ""
            echo "A config PR has been opened with all four addresses."
            echo "Merge it — subsequent releases use \`cd.yaml\`."
          } >> "$GITHUB_STEP_SUMMARY"
