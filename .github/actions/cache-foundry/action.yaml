---
name: Cache Foundry
description: Cache Foundry's Solidity compilation artifacts.

runs:
  using: composite
  steps:
    - id: cache_foundry
      name: Cache Foundry
      uses: actions/cache@v4
      with:
        path: |
          contracts/cache
          contracts/out
        key: ${{ runner.os }}-foundry-${{ hashFiles('contracts/foundry.toml', 'contracts/src/**/*.sol') }}
        restore-keys: |
          ${{ runner.os }}-foundry-
