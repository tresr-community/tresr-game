---
##################################################
# Name: cd-release.yaml
# Description: Single entrypoint for all releases
#
# Triggers:
#   - Push to trunk → Create pre-release (automatic)
#   - Manual dispatch → Create pre-release (Testnet) or promote to release (Mainnet)
#
# Flow:
#   1. Compute next version via convco (conventional commits)
#   2. Bump version in package.json, manifest.json, Cargo.toml
#   3. Testnet: Tag as v{version}, create pre-release
#      → calls cd-juno-testnet.yaml (workflow_call)
#   4. Mainnet: Promote existing pre-release tag to release
#      → calls cd-juno-mainnet.yaml (workflow_call)
##################################################

name: Release

on:
  push:
    branches:
      - main
      - master
      - trunk

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - Testnet
          - Mainnet
        default: Testnet
      release_tag:
        description: "Tag to promote (Mainnet only, e.g. v0.2.0)"
        required: false
        type: string
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  # GitHub
  PROJECT: ${{ github.repository }}
  BRANCH_NAME_CURRENT: ${{ github.head_ref || github.ref_name }}
  BRANCH_NAME_DEFAULT: ${{ github.event.repository.default_branch }}
  # Nix
  NIXPKGS_ALLOW_UNFREE: 1
  # Secretspec
  SECRETSPEC_PROVIDER: env

defaults:
  run:
    shell: bash

jobs:
  ##################################################
  # Create a pre-release
  # Triggers: push to trunk (auto) OR manual with Testnet
  ##################################################

  pre-release:
    name: Pre-Release

    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'Testnet')

    runs-on: ubuntu-latest
    environment: Testnet

    timeout-minutes: 15
    continue-on-error: false

    outputs:
      version: ${{ steps.compute_version.outputs.version }}
      tag: ${{ steps.compute_version.outputs.tag }}
      skip: ${{ steps.compute_version.outputs.skip }}

    steps:
      - id: checkout_repository
        name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: setup_devenv
        name: Setup devenv
        uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - id: compute_version
        name: Compute version
        shell: devenv shell --quiet bash -- -e {0}
        run: |
          # Get next version from conventional commits
          NEXT_VERSION=$(convco version --bump 2>/dev/null || echo "")

          if [[ -z "${NEXT_VERSION}" ]]; then
            echo "No conventional commits found to bump version"
            # Fall back to current version
            NEXT_VERSION=$(convco version)
          fi

          TAG="v${NEXT_VERSION}"

          # Check if tag already exists
          if git tag --list | grep -q "^${TAG}$"; then
            echo "Tag ${TAG} already exists, skipping release"
            echo "skip=true" >> "${GITHUB_OUTPUT}"
          else
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          fi

          echo "version=${NEXT_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "Version: ${NEXT_VERSION}, Tag: ${TAG}"

      - id: bump_version
        name: Bump version files
        if: steps.compute_version.outputs.skip != 'true'
        shell: devenv shell --quiet bash -- -e {0}
        run: |
          bun run version-set ${{ steps.compute_version.outputs.version }}

      - id: generate_changelog
        name: Generate changelog
        if: steps.compute_version.outputs.skip != 'true'
        shell: devenv shell --quiet bash -- -e {0}
        run: |
          # Generate changelog for unreleased commits
          CHANGELOG=$(convco changelog --unreleased 2>/dev/null || echo "No changelog available")
          # Write to file for the release step (multiline output)
          echo "${CHANGELOG}" > /tmp/changelog.md
          echo "Generated changelog for release"

      - id: create_release
        name: Create Pre-Release
        if: steps.compute_version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.compute_version.outputs.tag }}" \
            --title "Pre-Release ${{ steps.compute_version.outputs.tag }}" \
            --notes-file /tmp/changelog.md \
            --prerelease \
            --target "${{ github.sha }}"

  ##################################################
  # Deploy to Testnet (Juno)
  # Calls cd-juno-testnet.yaml via workflow_call
  ##################################################

  deploy-juno-testnet:
    name: Deploy Juno (Testnet)
    needs: pre-release
    if: needs.pre-release.outputs.skip != 'true'
    uses: ./.github/workflows/cd-juno-testnet.yaml
    with:
      version: ${{ needs.pre-release.outputs.tag }}
    secrets: inherit

  ##################################################
  # Promote a pre-release to release (mainnet)
  # Triggers: manual dispatch with Mainnet
  # Requires GitHub Environment "Mainnet" approvers
  ##################################################

  promote:
    name: Promote to Release (Mainnet)

    if: >-
      github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'Mainnet'

    runs-on: ubuntu-latest
    environment: Mainnet

    timeout-minutes: 5
    continue-on-error: false

    outputs:
      tag: ${{ steps.validate.outputs.tag }}

    steps:
      - id: validate
        name: Validate release tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          if [[ -z "${RELEASE_TAG}" ]]; then
            echo "::error::release_tag is required for Mainnet promotion"
            exit 1
          fi

          # Verify the release exists and is a pre-release
          RELEASE_INFO=$(gh release view "${RELEASE_TAG}" --json isPrerelease,tagName 2>&1) || {
            echo "::error::Release '${RELEASE_TAG}' not found"
            exit 1
          }

          IS_PRERELEASE=$(echo "${RELEASE_INFO}" | jq -r '.isPrerelease')
          if [[ "${IS_PRERELEASE}" != "true" ]]; then
            echo "::error::Release '${RELEASE_TAG}' is not a pre-release (already promoted?)"
            exit 1
          fi

          echo "tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "Validated: ${RELEASE_TAG} is a pre-release, ready to promote"

      - id: promote
        name: Promote pre-release to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ steps.validate.outputs.tag }}" \
            --prerelease=false \
            --title "Release ${{ steps.validate.outputs.tag }}"

          echo "Promoted ${{ steps.validate.outputs.tag }} to release"

  ##################################################
  # Deploy to Mainnet (Juno)
  # Calls cd-juno-mainnet.yaml via workflow_call
  ##################################################

  deploy-juno-mainnet:
    name: Deploy Juno (Mainnet)
    needs: promote
    uses: ./.github/workflows/cd-juno-mainnet.yaml
    with:
      version: ${{ needs.promote.outputs.tag }}
    secrets: inherit
