---
##################################################
# Name: ci-foundry.yaml
# Description: Lint and check Solidity contracts
##################################################

name: Foundry CI

on:
  pull_request:
    branches:
      - main
      - master
      - trunk
    paths:
      - "contracts/**"

  merge_group:
    branches:
      - trunk

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read
  pull-requests: read
  statuses: write

env:
  NIXPKGS_ALLOW_UNFREE: 1
  SECRETSPEC_PROVIDER: env
  FOUNDRY_PROFILE: ci

defaults:
  run:
    shell: bash

jobs:
  check:
    name: Check Contracts

    runs-on: ubuntu-latest

    timeout-minutes: 30
    continue-on-error: false

    environment: Testnet

    steps:
      - id: checkout_repository
        name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - id: setup_devenv
        name: Setup Devenv
        uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-cache-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - id: cache_foundry
        name: Cache Foundry
        uses: ./.github/actions/cache-foundry

      - id: check_solidity
        name: Check Solidity Contracts
        shell: devenv shell --quiet bash -- -e {0}
        run: |
          solidity-dev check

      - id: report_status
        name: Report Status
        if: always()
        uses: ./.github/actions/report-status
        with:
          result: ${{ steps.check_solidity.outcome }}
          success-message: "Foundry CI passed: contract checks"
          failure-message: "Foundry CI failed"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          workflow-name: ${{ github.workflow }}
          repository: ${{ github.repository }}
          sha: ${{ github.sha }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
