[profile.default]

src = 'src'
out = 'out'
libs = ['lib']
solc_version = '0.8.28'

remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
  "forge-std/=lib/forge-std/src/"
]

[profile.ci]

verbosity = 3

[profile.testnet]

verbosity = 3
evm_version = 'cancun'
# Fuji RPC rejects eth_getBlockByNumber("finalized"); disable storage-cache
# forking to avoid "-32000: cannot query unfinalized data" errors on broadcast.
no_storage_caching = true

[profile.mainnet]

verbosity = 2

[rpc_endpoints]

fuji = "https://api.avax-test.network/ext/bc/C/rpc"
mainnet = "https://api.avax.network/ext/bc/C/rpc"

[etherscan]

fuji = { key = "${SNOWTRACE_API_KEY}", url = "https://api-testnet.snowtrace.io/api" }
mainnet = { key = "${SNOWTRACE_API_KEY}", url = "https://api.snowtrace.io/api" }
