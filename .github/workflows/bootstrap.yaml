##################################################
# Name: bootstrap.yaml
# Description: First-time environment bootstrap
#
# Runs ONCE per environment to solve the oracle → vault → config dependency triangle.
#
# Executes sequentially in a SINGLE JOB:
#
# Guards:
#   - Aborts if any contract address in config is already non-zero.
#   - Manual dispatch only — never triggered automatically.
#
##################################################

name: Bootstrap Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - Testnet
          - Mainnet
      confirm:
        description: |
          Type "ship it" in the box below to confirm.

          The workflow will abort if any contract
          address in config is already populated.
        required: true
        type: string

concurrency:
  group: bootstrap-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  packages: read
  pull-requests: write
  statuses: write
  actions: write

env:
  NIXPKGS_ALLOW_UNFREE: 1
  SECRETSPEC_PROVIDER: env
  FOUNDRY_DISABLE_NIGHTLY_WARNING: 1

defaults:
  run:
    shell: bash

jobs:
  ##################################################
  # Bootstrap
  ##################################################
  bootstrap:
    name: Bootstrap ${{ inputs.environment }}

    runs-on: ubuntu-latest
    timeout-minutes: 120
    continue-on-error: false

    environment: ${{ inputs.environment }}

    env:
      FOUNDRY_PROFILE: >-
        ${{ vars.FOUNDRY_PROFILE ||
            (inputs.environment == 'Mainnet' && 'mainnet' || 'testnet') }}

    steps:
      # ── Guard ─────────────────────────────────────────────────────────
      - id: confirm_intent
        name: Confirm intent
        run: |
          if [[ "${{ inputs.confirm }}" != "ship it" ]]; then
            echo "::error::Confirmation must be exactly \"ship it\". Got: \"${{ inputs.confirm }}\""
            exit 1
          fi
          echo "✅ Confirmation accepted"

      - id: checkout_repository
        name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          submodules: recursive
          lfs: true

      - id: verify_addresses
        name: Verify all addresses are zero (safe to bootstrap)
        run: |
          NETWORK=$(echo "${{ inputs.environment }}" | tr '[:upper:]' '[:lower:]')
          CONFIG="config/tresr.yaml"
          ZERO="0x0000000000000000000000000000000000000000"
          ABORT=0

          check_zero() {
            local key="$1"
            local val
            val=$(yq ".client.blockchain.avalanche.${NETWORK}.${key}" "$CONFIG" 2>/dev/null || echo "")
            if [[ -n "$val" && "$val" != "null" && "$val" != "$ZERO" ]]; then
              echo "::error::${key} is already set to ${val} — not a fresh environment."
              ABORT=$((ABORT + 1))
            else
              echo "  ✅ ${key} = zero"
            fi
          }

          echo "Checking $NETWORK addresses in $CONFIG …"
          check_zero oracle_address
          check_zero tresr_token_contract
          check_zero vault_contract
          check_zero faucet_contract

          if [[ $ABORT -gt 0 ]]; then
            echo ""
            echo "::error::Bootstrap aborted — $ABORT address(es) are already deployed."
            echo "Use cd-testnet.yaml / cd-mainnet.yaml for subsequent releases."
            exit 1
          fi

          echo ""
          echo "✅ All addresses are zero — safe to proceed"

      # ── Setup ────────────────────────────────────────────────────
      - id: setup_devenv
        name: Setup Devenv
        uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-cache-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skip-push: "true"

      # ── Juno Deploy — Pass 1 (no vault address yet) ───────────────────
      - id: deploy_juno_pass1
        name: Deploy Juno
        uses: ./.github/actions/deploy-juno
        with:
          mode: ${{ inputs.environment == 'Mainnet' && 'production' || 'staging' }}
          satellite-id: ${{ vars.VITE_SATELLITE_ID }}
          orbiter-id: ${{ vars.VITE_ORBITER_ID }}
          astro-site-url: ${{ vars.VITE_ASTRO_SITE_URL }}
          siwa-provider-id: ${{ vars.VITE_SIWA_PROVIDER_ID }}
          walletconnect-project-id: ${{ secrets.PUBLIC_WALLETCONNECT_PROJECT_ID }}
          satellite-network: ${{ inputs.environment == 'Mainnet' && 'mainnet' || 'testnet' }}

      - id: verify_oracle
        name: Verify Oracle Address
        run: |
          ORACLE="${{ steps.deploy_juno_pass1.outputs.oracle_address }}"
          if [[ -z "$ORACLE" ]]; then
            echo "::error::No oracle address from Juno deploy"
            exit 1
          fi
          echo "✅ Oracle: ${ORACLE}"

      # ── Deploy Contracts — Token + Faucet + Vault ─────────────────────
      - id: foundry_deploy_setup
        name: Resolve Environment
        uses: ./.github/actions/foundry-deploy-setup
        with:
          environment: ${{ inputs.environment }}
          oracle-address: ${{ steps.deploy_juno_pass1.outputs.oracle_address }}
          deployer-private-key: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          snowtrace-api-key: ${{ secrets.SNOWTRACE_API_KEY }}

      - id: resolve_token
        name: Deploy Token + Faucet
        if: inputs.environment == 'Testnet'
        uses: ./.github/actions/foundry-resolve-token
        with:
          rpc-url: ${{ steps.foundry_deploy_setup.outputs.RPC_URL }}
          chain-id: ${{ steps.foundry_deploy_setup.outputs.CHAIN_ID }}
          token-address: ${{ steps.foundry_deploy_setup.outputs.TOKEN_ADDRESS }}
          faucet-address: ${{ steps.foundry_deploy_setup.outputs.FAUCET_ADDRESS }}
          deployer-private-key: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          snowtrace-api-key: ${{ secrets.SNOWTRACE_API_KEY }}

      - id: resolve_vault
        name: Deploy Vault
        uses: ./.github/actions/foundry-resolve-vault
        with:
          network: ${{ steps.foundry_deploy_setup.outputs.network }}
          rpc-url: ${{ steps.foundry_deploy_setup.outputs.RPC_URL }}
          chain-id: ${{ steps.foundry_deploy_setup.outputs.CHAIN_ID }}
          oracle-address: ${{ steps.foundry_deploy_setup.outputs.ORACLE_ADDRESS }}
          admin-address: ${{ steps.foundry_deploy_setup.outputs.ADMIN_ADDRESS }}
          token-address: >-
            ${{ steps.resolve_token.outputs.token_address ||
                steps.foundry_deploy_setup.outputs.TOKEN_ADDRESS }}
          vault-address: ${{ steps.foundry_deploy_setup.outputs.VAULT_ADDRESS }}
          deployer-private-key: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          snowtrace-api-key: ${{ secrets.SNOWTRACE_API_KEY }}

      - id: summarize_deploy
        name: Contract Deploy Summary
        if: always()
        run: |
          {
            echo "## 📜 Contract Deployment"
            echo ""
            echo "| Contract | Address |"
            echo "|----------|---------|"
            echo "| Oracle   | \`${{ steps.deploy_juno_pass1.outputs.oracle_address }}\` |"
            echo "| Token    | \`${{ steps.resolve_token.outputs.token_address }}\` |"
            echo "| Vault    | \`${{ steps.resolve_vault.outputs.vault_address }}\` |"
            echo "| Faucet   | \`${{ steps.resolve_token.outputs.faucet_address }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Patch config + Juno Pass 2 ────────────────────────────────────
      - id: update_config
        name: Patch Config
        uses: ./.github/actions/update-tresr-config
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          environment: ${{ inputs.environment == 'Testnet' && 'testnet' || 'mainnet' }}
          base-ref: ${{ github.ref_name }}
          oracle-address: ${{ steps.deploy_juno_pass1.outputs.oracle_address }}
          token-address: ${{ steps.resolve_token.outputs.token_address }}
          vault-address: ${{ steps.resolve_vault.outputs.vault_address }}
          faucet-address: ${{ steps.resolve_token.outputs.faucet_address }}

      - id: build_hosting
        name: Build Juno
        if: steps.update_config.outputs.changed == 'true'
        shell: devenv shell --quiet bash -- -e {0}
        run: bun run build

      - id: deploy_juno_pass2
        name: Deploy Juno
        if: steps.update_config.outputs.changed == 'true'
        uses: ./.github/actions/deploy-juno
        with:
          mode: ${{ inputs.environment == 'Mainnet' && 'production' || 'staging' }}
          satellite-id: ${{ vars.VITE_SATELLITE_ID }}
          orbiter-id: ${{ vars.VITE_ORBITER_ID }}
          astro-site-url: ${{ vars.VITE_ASTRO_SITE_URL }}
          siwa-provider-id: ${{ vars.VITE_SIWA_PROVIDER_ID }}
          walletconnect-project-id: ${{ secrets.PUBLIC_WALLETCONNECT_PROJECT_ID }}
          satellite-network: ${{ inputs.environment == 'Mainnet' && 'mainnet' || 'testnet' }}
          skip-functions: "true"

      # ── Summary ───────────────────────────────────────────────────────
      - id: summarize_bootstrap
        name: Bootstrap Complete Summary
        run: |
          {
            echo "## 🎉 Bootstrap Complete — ${{ inputs.environment }}"
            echo ""
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "| Oracle  | \`${{ steps.deploy_juno_pass1.outputs.oracle_address }}\` |"
            echo "| Token   | \`${{ steps.resolve_token.outputs.token_address }}\` |"
            echo "| Vault   | \`${{ steps.resolve_vault.outputs.vault_address }}\` |"
            echo "| Faucet  | \`${{ steps.resolve_token.outputs.faucet_address }}\` |"
            echo ""
            echo "A config PR has been opened with all four addresses."
            echo "Merge it — subsequent releases use \`cd-testnet.yaml\` / \`cd-mainnet.yaml\`."
          } >> "$GITHUB_STEP_SUMMARY"
