---
name: Cache Trivy DB
description: Caches the Trivy vulnerability database to speed up security scans and avoid rate limits.

runs:
  using: composite
  steps:
    - id: cache_trivy_db
      name: Cache Trivy DB
      uses: actions/cache@v4
      with:
        path: ~/.cache/trivy
        key: trivy-db-${{ runner.os }}-${{ github.run_id }}
        restore-keys: |
          trivy-db-${{ runner.os }}-
