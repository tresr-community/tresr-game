---
##################################################
# Name: cd-foundry-testnet.yaml
# Description: Deploy Solidity contracts to Avalanche Fuji (Testnet)
#
# Called by: cd-release-testnet.yaml (deploy-foundry-testnet job)
#
# Deploys: Test Token + Faucet + Vault (with upgrade path)
##################################################

name: Foundry Deploy (Testnet)

on:
  workflow_call:
    inputs:
      oracle_address:
        description: "Oracle address from Juno deploy"
        type: string
        required: false
        default: ""
    outputs:
      token_address:
        value: ${{ jobs.deploy.outputs.token_address }}
      vault_address:
        value: ${{ jobs.deploy.outputs.vault_address }}
      faucet_address:
        value: ${{ jobs.deploy.outputs.faucet_address }}
      deployed:
        value: ${{ jobs.deploy.outputs.deployed }}

concurrency:
  group: foundry-testnet-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: read
  pull-requests: read
  statuses: write

env:
  NIXPKGS_ALLOW_UNFREE: 1
  SECRETSPEC_PROVIDER: env
  FOUNDRY_PROFILE: testnet
  FOUNDRY_DISABLE_NIGHTLY_WARNING: 1

defaults:
  run:
    shell: bash

jobs:
  ##################################################
  # Deploy contracts (Testnet)
  ##################################################

  deploy:
    name: Deploy Contracts (Testnet)

    runs-on: ubuntu-latest

    timeout-minutes: 60
    continue-on-error: false

    environment: Testnet

    outputs:
      token_address: ${{ steps.resolve_token.outputs.token_address }}
      vault_address: ${{ steps.resolve_vault.outputs.vault_address }}
      faucet_address: ${{ steps.resolve_token.outputs.faucet_address }}
      deployed: ${{ steps.resolve_vault.outputs.deployed }}

    steps:
      # --- Workflow-level prerequisites ---
      - id: checkout_repository
        name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
          lfs: true

      - id: setup_devenv
        name: Setup Devenv
        uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-cache-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # --- Common setup (composite action) ---
      - id: foundry_deploy_setup
        name: Foundry Deploy Setup
        uses: ./.github/actions/foundry-deploy-setup
        with:
          environment: Testnet
          oracle-address: ${{ inputs.oracle_address }}
          deployer-private-key: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          snowtrace-api-key: ${{ secrets.SNOWTRACE_API_KEY }}

      # --- Testnet-only: Token + Faucet (bytecode check + dry-run) ---
      - id: resolve_token
        name: Resolve Token + Faucet
        uses: ./.github/actions/foundry-resolve-token
        with:
          rpc-url: ${{ steps.foundry_deploy_setup.outputs.RPC_URL }}
          chain-id: ${{ steps.foundry_deploy_setup.outputs.CHAIN_ID }}
          token-address: ${{ steps.foundry_deploy_setup.outputs.TOKEN_ADDRESS }}
          faucet-address: ${{ steps.foundry_deploy_setup.outputs.FAUCET_ADDRESS }}
          deployer-private-key: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          snowtrace-api-key: ${{ secrets.SNOWTRACE_API_KEY }}

      # --- Vault deploy/upgrade (composite action) ---
      - id: resolve_vault
        name: Resolve Vault
        if: always() && steps.resolve_token.outcome != 'failure'
        uses: ./.github/actions/foundry-resolve-vault
        with:
          network: testnet
          rpc-url: ${{ steps.foundry_deploy_setup.outputs.RPC_URL }}
          chain-id: ${{ steps.foundry_deploy_setup.outputs.CHAIN_ID }}
          token-address: ${{ steps.resolve_token.outputs.token_address }}
          oracle-address: ${{ inputs.oracle_address || steps.foundry_deploy_setup.outputs.ORACLE_ADDRESS }}
          admin-address: ${{ steps.foundry_deploy_setup.outputs.ADMIN_ADDRESS }}
          vault-address: ${{ steps.foundry_deploy_setup.outputs.VAULT_ADDRESS }}
          deployer-private-key: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          snowtrace-api-key: ${{ secrets.SNOWTRACE_API_KEY }}

      # --- Deploy summary (composite action) ---
      - id: deploy_summary
        name: Deploy Summary
        if: always()
        uses: ./.github/actions/foundry-deploy-summary
        with:
          network: testnet
          chain-id: ${{ steps.foundry_deploy_setup.outputs.CHAIN_ID }}
          oracle-address: ${{ inputs.oracle_address || steps.foundry_deploy_setup.outputs.ORACLE_ADDRESS }}
          admin-address: ${{ steps.foundry_deploy_setup.outputs.ADMIN_ADDRESS }}
          token-address: ${{ steps.resolve_token.outputs.token_address }}
          vault-address: ${{ steps.resolve_vault.outputs.vault_address }}
          workflow-name: cd-foundry-testnet
