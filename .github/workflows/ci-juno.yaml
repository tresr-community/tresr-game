---
##################################################
# Name: ci-juno.yaml
# Description: Lint, type-check, and build Juno satellite
##################################################

name: Juno CI

on:
  pull_request:
    branches:
      - main
      - master
      - trunk

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read
  pull-requests: read
  statuses: write

env:
  NIXPKGS_ALLOW_UNFREE: 1
  SECRETSPEC_PROVIDER: env

defaults:
  run:
    shell: bash

jobs:
  check:
    name: Lint & Build

    runs-on: ubuntu-latest

    timeout-minutes: 30
    continue-on-error: false

    environment: Testnet

    steps:
      - id: setup_devenv
        name: Setup Devenv
        uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-cache-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - id: setup_juno
        name: Setup Juno
        uses: ./.github/actions/setup-juno

      - id: lint
        name: Lint
        shell: devenv shell --quiet bash -- -e {0}
        run: |
          bun run lint

      - id: build_hosting
        name: Build Hosting
        shell: devenv shell --quiet bash -- -e {0}
        run: |
          juno-dev build

      - id: build_functions_dev
        name: Build Functions (Development)
        shell: devenv shell --quiet bash -- -e {0}
        run: |
          juno-dev build-functions

      - id: build_functions_prod
        name: Build Functions (Production)
        shell: devenv shell --quiet bash -- -e {0}
        run: |
          juno functions build

      - id: report_status
        name: Report Status
        if: always()
        uses: ./.github/actions/report-status
        with:
          result: ${{ steps.build_hosting.outcome }}
          success-description: "Juno CI passed: lint, type-check, build"
          failure-description: "Juno CI failed"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          workflow-name: ${{ github.workflow }}
          repository: ${{ github.repository }}
          sha: ${{ github.sha }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
