---
##################################################
# Name: ci-devenv.yaml
# Description: Validate developer environment builds and tests correctly
##################################################

name: Devenv CI

on:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

env:
  NIXPKGS_ALLOW_UNFREE: 1
  SECRETSPEC_PROVIDER: env

defaults:
  run:
    shell: bash

jobs:
  test:
    name: Devenv Test

    runs-on: ubuntu-latest

    timeout-minutes: 60
    continue-on-error: false

    defaults:
      run:
        shell: devenv shell --quiet bash -- -e {0}

    steps:
      - id: checkout_repository
        name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive
          lfs: true

      - id: setup_devenv
        name: Setup Devenv
        uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-cache-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - id: install_deps
        name: Install Dependencies
        run: |
          bun install

      - id: devenv_test
        name: Run Devenv Test
        run: |
          devenv test
