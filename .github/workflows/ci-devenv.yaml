---
##################################################
# Name: ci-devenv.yaml
# Description: Validate developer environment builds and tests correctly
##################################################

name: Devenv CI

on:
  pull_request:
    branches:
      - main
      - master
      - trunk
    paths:
      - .github/workflows/ci-devenv.yaml
      - devenv.nix
      - devenv.yaml
      - devenv.lock
      - src/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  pull-requests: write
  statuses: write

env:
  NIXPKGS_ALLOW_UNFREE: 1
  SECRETSPEC_PROVIDER: env

defaults:
  run:
    shell: bash

jobs:
  test:
    name: Test

    runs-on: ubuntu-latest

    timeout-minutes: 60
    continue-on-error: false

    environment: Testnet

    steps:
      - id: setup_devenv
        name: Setup Devenv
        uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-cache-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - id: install_deps
        name: Install Dependencies
        shell: devenv shell --quiet bash -- -e {0}
        run: |
          bun install

      - id: devenv_test
        name: Run Devenv Test
        run: |
          devenv test

      - id: report_status
        name: Report Status
        if: always()
        uses: ./.github/actions/report-status
        with:
          result: ${{ steps.devenv_test.outcome }}
          success-description: "Devenv test passed!"
          failure-description: "Devenv test failed!"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          workflow-name: ${{ github.workflow }}
          repository: ${{ github.repository }}
          sha: ${{ github.sha }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
