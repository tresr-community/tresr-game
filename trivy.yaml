##################################################
# Trivy Configuration
# https://aquasecurity.github.io/trivy/latest/docs/references/configuration/config-file/
##################################################

scan:
  # Scanners to enable
  scanners:
    - vuln
    - misconfig
    - secret
    - license

  # Severity levels to report
  severity:
    - CRITICAL
    - HIGH
    - MEDIUM

  # Skip directories
  skip-dirs:
    - .devenv
    - .dfx
    - .direnv
    - .dist
    - .git
    - .github
    - .vscode
    - .codeql-db
    - .juno
    - contracts/lib
    - docs/agents
    - node_modules
    - target

  # Skip files
  skip-files:
    - "bun.lock"
    - "Cargo.lock"

vulnerability:
  # Ignore unfixed vulnerabilities
  ignore-unfixed: true
