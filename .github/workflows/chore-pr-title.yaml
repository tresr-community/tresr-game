---
##################################################
# Name: chore-pr-title.yaml
# Description: Enforce conventional commit format on PR titles
#
# Triggers:
#   - Pull request opened, edited, or synchronized
#
# PR titles must follow the conventional commit format:
#   type(scope): description
#
# This ensures squash-merged commits produce clean changelogs
# and correct semantic version bumps via convco.
##################################################

name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

defaults:
  run:
    shell: bash

jobs:
  check:
    name: Conventional Commit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - id: check_pr_title
        name: Check PR Title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^.+$
          subjectPatternError: |
            PR title "{title}" doesn't follow conventional commit format.

            Expected: type(scope): description
            Examples:
              feat: add new game mode
              fix(auth): handle expired delegation
              chore(ci): update workflow
