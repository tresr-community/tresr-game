---
##################################################
# Name: codeql-config.yml
# Description: Custom CodeQL configuration
#
# Excludes generated/vendored paths from analysis
# to reduce noise and false positives.
##################################################

name: "TRESR Game CodeQL Configuration"

paths-ignore:
  - "contracts/cache/**"
  - "contracts/lib/**"
  - "contracts/out/**"
  - "dist/**"
  - "docs/agents/**"
  - "node_modules/**"
  - "public/workers/**"
  - "target/**"
