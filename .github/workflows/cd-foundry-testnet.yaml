---
##################################################
# Name: cd-foundry-testnet.yaml
# Description: Deploy Solidity contracts to Avalanche Fuji (Testnet)
#
# Called by: cd-release-testnet.yaml (deploy-foundry-testnet job)
#
# Deploys: Test Token + Faucet + Vault (with upgrade path)
##################################################

name: Foundry Deploy (Testnet)

on:
  workflow_call:
    inputs:
      oracle_address:
        description: "Oracle address from Juno deploy"
        type: string
        required: false
        default: ""
    outputs:
      token_address:
        value: ${{ jobs.deploy.outputs.token_address }}
      vault_address:
        value: ${{ jobs.deploy.outputs.vault_address }}
      faucet_address:
        value: ${{ jobs.deploy.outputs.faucet_address }}
      deployed:
        value: ${{ jobs.detect-changes.outputs.deploy }}

concurrency:
  group: foundry-testnet-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: read
  pull-requests: read
  statuses: write

env:
  NIXPKGS_ALLOW_UNFREE: 1
  SECRETSPEC_PROVIDER: env
  FOUNDRY_PROFILE: testnet
  FOUNDRY_DISABLE_NIGHTLY_WARNING: 1

defaults:
  run:
    shell: bash

jobs:
  ##################################################
  # Detect contract changes
  ##################################################

  detect-changes:
    name: Detect Contract Changes

    runs-on: ubuntu-latest

    outputs:
      deploy: ${{ steps.check.outputs.deploy }}

    steps:
      - id: checkout_repository
        name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: check
        name: Check for Changes
        uses: ./.github/actions/detect-foundry-changes
        with:
          workflow-file: cd-foundry-testnet.yaml

  ##################################################
  # Deploy contracts (Testnet)
  ##################################################

  deploy:
    name: Deploy (Testnet)

    needs: detect-changes
    if: needs.detect-changes.outputs.deploy == 'true'

    runs-on: ubuntu-latest

    timeout-minutes: 60
    continue-on-error: false

    environment: Testnet

    outputs:
      token_address: ${{ steps.resolve_token_address.outputs.token_address }}
      vault_address: ${{ steps.vault.outputs.vault_address }}
      faucet_address: ${{ steps.resolve_faucet_address.outputs.faucet_address }}

    steps:
      # --- Workflow-level prerequisites ---
      - id: checkout_repository
        name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - id: free_disk_space
        name: Free Disk Space
        uses: ./.github/actions/free-disk-space

      - id: setup_devenv
        name: Setup Devenv
        uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-cache-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # --- Common setup (composite action) ---
      - id: setup
        name: Foundry Deploy Setup
        uses: ./.github/actions/foundry-deploy-setup
        with:
          environment: Testnet
          oracle-address: ${{ inputs.oracle_address }}
          deployer-private-key: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          snowtrace-api-key: ${{ secrets.SNOWTRACE_API_KEY }}

      # --- Testnet-only: Deploy test token + faucet ---
      - id: deploy_test_token
        name: Deploy Test Token
        continue-on-error: true
        shell: devenv shell --quiet bash -- -e {0}
        env:
          SNOWTRACE_API_KEY: ${{ secrets.SNOWTRACE_API_KEY }}
        run: |
          cd contracts
          forge script script/DeployToken.s.sol:DeployTestToken \
            --rpc-url ${{ steps.setup.outputs.RPC_URL }} \
            --broadcast \
            --verify \
            --etherscan-api-key "$SNOWTRACE_API_KEY" \
            -vvvv

      - id: resolve_token_address
        name: Resolve Token Address
        if: always()
        run: |
          CHAIN_ID="${{ steps.setup.outputs.CHAIN_ID }}"
          CONFIG_TOKEN="${{ steps.setup.outputs.TOKEN_ADDRESS }}"
          ZERO="0x0000000000000000000000000000000000000000"
          DEPLOYED_TOKEN=""

          # Try to extract freshly-deployed token from broadcast
          LATEST="contracts/broadcast/DeployToken.s.sol/${CHAIN_ID}/run-latest.json"
          if [[ -f "$LATEST" ]]; then
            DEPLOYED_TOKEN=$(jq -r '.transactions[] | select(.transactionType == "CREATE" and .contractName == "RonToken") | .contractAddress' "$LATEST" 2>/dev/null | head -1)
          fi

          if [[ -n "$DEPLOYED_TOKEN" && ("$CONFIG_TOKEN" == "$ZERO" || -z "$CONFIG_TOKEN" || "$CONFIG_TOKEN" == "null") ]]; then
            echo "token_address=${DEPLOYED_TOKEN}" >> "$GITHUB_OUTPUT"
            echo "🔗 Using freshly-deployed token: ${DEPLOYED_TOKEN}"
          else
            echo "token_address=${CONFIG_TOKEN}" >> "$GITHUB_OUTPUT"
            echo "🔗 Using config token: ${CONFIG_TOKEN}"
          fi

      - id: resolve_faucet_address
        name: Resolve Faucet Address
        if: always()
        run: |
          CHAIN_ID="${{ steps.setup.outputs.CHAIN_ID }}"
          DEPLOYED_FAUCET=""

          LATEST="contracts/broadcast/DeployToken.s.sol/${CHAIN_ID}/run-latest.json"
          if [[ -f "$LATEST" ]]; then
            DEPLOYED_FAUCET=$(jq -r '.transactions[] | select(.transactionType == "CREATE" and .contractName == "TresrFaucet") | .contractAddress' "$LATEST" 2>/dev/null | head -1)
          fi

          if [[ -n "$DEPLOYED_FAUCET" ]]; then
            echo "faucet_address=${DEPLOYED_FAUCET}" >> "$GITHUB_OUTPUT"
            echo "🔗 Faucet: ${DEPLOYED_FAUCET}"
          else
            echo "faucet_address=" >> "$GITHUB_OUTPUT"
            echo "No faucet deployed this run"
          fi

      - id: check_test_token
        name: Check Test Token Deploy
        if: always()
        run: |
          OUTCOME="${{ steps.deploy_test_token.outcome }}"
          if [[ "$OUTCOME" == "failure" ]]; then
            echo "::error::Deploy Test Token failed"
            exit 1
          fi
          echo "✓ Deploy Test Token: ${OUTCOME:-n/a}"

      # --- Vault deploy/upgrade (composite action) ---
      - id: vault
        name: Resolve Vault
        if: always() && steps.check_test_token.outcome != 'failure'
        uses: ./.github/actions/foundry-resolve-vault
        with:
          network: testnet
          rpc-url: ${{ steps.setup.outputs.RPC_URL }}
          chain-id: ${{ steps.setup.outputs.CHAIN_ID }}
          token-address: ${{ steps.resolve_token_address.outputs.token_address }}
          oracle-address: ${{ inputs.oracle_address || steps.setup.outputs.ORACLE_ADDRESS }}
          admin-address: ${{ steps.setup.outputs.ADMIN_ADDRESS }}
          vault-address: ${{ steps.setup.outputs.VAULT_ADDRESS }}
          deployer-private-key: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          snowtrace-api-key: ${{ secrets.SNOWTRACE_API_KEY }}

      # --- Deploy summary (composite action) ---
      - id: summary
        name: Deploy Summary
        if: always()
        uses: ./.github/actions/foundry-deploy-summary
        with:
          network: testnet
          chain-id: ${{ steps.setup.outputs.CHAIN_ID }}
          oracle-address: ${{ inputs.oracle_address || steps.setup.outputs.ORACLE_ADDRESS }}
          admin-address: ${{ steps.setup.outputs.ADMIN_ADDRESS }}
          token-address: ${{ steps.resolve_token_address.outputs.token_address }}
          vault-address: ${{ steps.vault.outputs.vault_address }}
          workflow-name: cd-foundry-testnet
