---
name: Setup Devenv
description: Install Nix + Cachix + devenv, and run secretspec check. Requires checkout first.

inputs:
  github-token:
    description: "GitHub token for Nix and Cachix"
    required: true
  cachix-cache-name:
    description: "Name of the Cachix binary cache"
    required: false
    default: ""
  cachix-auth-token:
    description: "Auth token for Cachix push"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - id: free_disk_space
      name: Free Disk Space
      uses: ./.github/actions/free-disk-space

    - id: install_nix
      name: Install Nix
      uses: cachix/install-nix-action@v31
      with:
        github_access_token: ${{ inputs.github-token }}
        enable_kvm: true

    - id: nix_cache
      name: Cache Nix Store
      uses: nix-community/cache-nix-action@v7
      with:
        primary-key: nix-${{ runner.os }}-${{ hashFiles('devenv.lock') }}
        restore-prefixes-first-match: nix-${{ runner.os }}-
        gc-max-store-size-linux: 5G
        purge: true
        purge-created: P7D
        token: ${{ inputs.github-token }}

    - id: enable_cachix
      name: Enable Cachix
      if: inputs.cachix-cache-name != ''
      uses: cachix/cachix-action@v16
      with:
        name: ${{ inputs.cachix-cache-name }}
        authToken: ${{ inputs.cachix-auth-token }}
        useDaemon: true
        skipPush: false

    - id: install_devenv
      name: Install Devenv
      shell: bash
      run: |
        nix profile install --accept-flake-config nixpkgs#devenv

    - id: secretspec_check
      name: Secretspec Check
      shell: devenv shell --quiet bash -- -e {0}
      run: |
        secretspec check
