---
##################################################
# Name: cd-foundry.yaml
# Description: Deploy Solidity contracts to Avalanche
#
# Triggers:
#   - Push to trunk (contracts/ changes) → Deploy to Testnet (Fuji)
#   - Manual dispatch → Deploy to Testnet or Mainnet
##################################################

name: Foundry Deploy

on:
  push:
    branches:
      - main
      - master
      - trunk
    paths:
      - "contracts/**"

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - Testnet
          - Mainnet
        default: Testnet

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: read
  pull-requests: read
  statuses: write

env:
  NIXPKGS_ALLOW_UNFREE: 1
  SECRETSPEC_PROVIDER: env
  FOUNDRY_PROFILE: ci

defaults:
  run:
    shell: bash

jobs:
  deploy:
    name: Deploy (${{ github.event_name == 'push' && 'Testnet' || github.event.inputs.environment }})

    runs-on: ubuntu-latest

    timeout-minutes: 30
    continue-on-error: false

    environment: ${{ github.event_name == 'push' && 'Testnet' || github.event.inputs.environment }}

    steps:
      - id: checkout_repository
        name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - id: setup_devenv
        name: Setup Devenv
        uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-cache-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - id: cache_foundry
        name: Cache Foundry
        uses: ./.github/actions/cache-foundry

      - id: resolve_environment
        name: Resolve Environment
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "network=testnet" >> "$GITHUB_OUTPUT"
          else
            ENV="${{ github.event.inputs.environment }}"
            echo "network=$(echo "${ENV}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          fi

      - id: read_config
        name: Read Config
        run: |
          NETWORK="${{ steps.resolve_environment.outputs.network }}"
          {
            echo "RPC_URL=$(yq ".client.blockchain.avalanche.${NETWORK}.rpc_url" config/tresr.yaml)"
            echo "CHAIN_ID=$(yq ".client.blockchain.avalanche.${NETWORK}.chain_id" config/tresr.yaml)"
            echo "TOKEN_ADDRESS=$(yq ".client.blockchain.avalanche.${NETWORK}.tresr_token_contract" config/tresr.yaml)"
            echo "ORACLE_ADDRESS=$(yq ".client.blockchain.avalanche.${NETWORK}.oracle_address" config/tresr.yaml)"
            echo "ADMIN_ADDRESS=$(yq ".client.blockchain.avalanche.${NETWORK}.safe_address" config/tresr.yaml)"
          } >> "$GITHUB_OUTPUT"

      - id: build_contracts
        name: Build Contracts
        shell: devenv shell --quiet bash -- -e {0}
        run: |
          forge build --root contracts

      - id: deploy_test_token
        name: Deploy Test Token (Testnet Only)
        if: steps.resolve_environment.outputs.network == 'testnet'
        shell: devenv shell --quiet bash -- -e {0}
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          SNOWTRACE_API_KEY: ${{ secrets.SNOWTRACE_API_KEY }}
        run: |
          forge script script/DeployTestToken.s.sol:DeployTestToken \
            --root contracts \
            --rpc-url ${{ steps.read_config.outputs.RPC_URL }} \
            --broadcast \
            --verify \
            --etherscan-api-key "$SNOWTRACE_API_KEY"

      - id: deploy_contracts
        name: Deploy Contracts
        shell: devenv shell --quiet bash -- -e {0}
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          TOKEN_ADDRESS: ${{ steps.read_config.outputs.TOKEN_ADDRESS }}
          ADMIN_ADDRESS: ${{ steps.read_config.outputs.ADMIN_ADDRESS }}
          ORACLE_ADDRESS: ${{ steps.read_config.outputs.ORACLE_ADDRESS }}
          SNOWTRACE_API_KEY: ${{ secrets.SNOWTRACE_API_KEY }}
        run: |
          forge script script/Vault.s.sol:DeployVault \
            --root contracts \
            --rpc-url ${{ steps.read_config.outputs.RPC_URL }} \
            --broadcast \
            --verify \
            --etherscan-api-key "$SNOWTRACE_API_KEY"

      - id: deploy_summary
        name: Deploy Summary
        if: always()
        run: |
          NETWORK="${{ steps.resolve_environment.outputs.network }}"
          CHAIN_ID="${{ steps.read_config.outputs.CHAIN_ID }}"

          # Set explorer URL based on network
          if [[ "$NETWORK" == "mainnet" ]]; then
            EXPLORER="https://snowtrace.io"
            NET_EMOJI="🟢"
            NET_LABEL="Mainnet (C-Chain)"
          else
            EXPLORER="https://testnet.snowtrace.io"
            NET_EMOJI="🟡"
            NET_LABEL="Testnet (Fuji)"
          fi

          {
            echo "## 🏗️ Foundry Deploy Summary"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Network** | ${NET_EMOJI} ${NET_LABEL} |"
            echo "| **Chain ID** | \`${CHAIN_ID}\` |"
            echo "| **Explorer** | [${EXPLORER}](${EXPLORER}) |"
            echo ""

            # Find all broadcast run-latest.json files
            FOUND_CONTRACTS=false
            for BROADCAST in contracts/broadcast/*/; do
              SCRIPT_NAME=$(basename "$BROADCAST")
              LATEST="contracts/broadcast/${SCRIPT_NAME}/${CHAIN_ID}/run-latest.json"

              if [[ ! -f "$LATEST" ]]; then
                continue
              fi

              # Extract CREATE transactions (deployed contracts)
              CONTRACTS=$(jq -r '.transactions[] | select(.transactionType == "CREATE") | "\(.contractName)|\(.contractAddress)"' "$LATEST" 2>/dev/null)

              if [[ -z "$CONTRACTS" ]]; then
                continue
              fi

              if [[ "$FOUND_CONTRACTS" == "false" ]]; then
                echo "### 📋 Deployed Contracts"
                echo ""
                echo "| Contract | Address | Explorer |"
                echo "|----------|---------|----------|"
                FOUND_CONTRACTS=true
              fi

              while IFS='|' read -r NAME ADDR; do
                echo "| 📦 **${NAME}** | \`${ADDR}\` | [View ↗](${EXPLORER}/address/${ADDR}) |"
              done <<< "$CONTRACTS"
            done

            if [[ "$FOUND_CONTRACTS" == "false" ]]; then
              echo "> ⚠️ No contracts were deployed (check step logs above)."
            fi

            echo ""
            echo "---"
            echo "*Deployed via \`cd-foundry.yaml\` • $(date -u '+%Y-%m-%d %H:%M UTC')*"
          } >> "$GITHUB_STEP_SUMMARY"
