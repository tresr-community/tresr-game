---
##################################################
# Name: cd-juno-testnet.yaml
# Description: Deploy Juno to testnet (hosting + functions + config)
#
# Called by: cd-release-testnet.yaml (deploy-juno-testnet job)
#
##################################################

name: Juno Deploy (Testnet)

on:
  workflow_call:
    inputs:
      version:
        description: "Release version (e.g. v0.1.0)"
        type: string
        required: false
        default: ""
    outputs:
      oracle_address:
        description: "Deployed oracle contract address"
        value: ${{ jobs.deploy.outputs.oracle_address }}

concurrency:
  group: juno-testnet-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  packages: read
  pull-requests: read
  statuses: write

env:
  NIXPKGS_ALLOW_UNFREE: 1
  SECRETSPEC_PROVIDER: env
  VITE_SATELLITE_ID: ${{ vars.VITE_SATELLITE_ID }}
  VITE_ASTRO_SITE_URL: ${{ vars.VITE_ASTRO_SITE_URL }}
  VITE_ORBITER_ID: ${{ vars.VITE_ORBITER_ID }}
  VITE_SIWA_PROVIDER_ID: ${{ vars.VITE_SIWA_PROVIDER_ID }}
  PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.PUBLIC_WALLETCONNECT_PROJECT_ID }}

defaults:
  run:
    shell: bash

jobs:
  deploy:
    name: Deploy (Testnet)

    runs-on: ubuntu-latest

    timeout-minutes: 60
    continue-on-error: false

    environment: Testnet

    outputs:
      oracle_address: ${{ steps.get_oracle_address.outputs.oracle_address }}

    steps:
      - id: check_vars
        name: Check Variables
        run: |
          REQUIRED_VARS=(
            VITE_ASTRO_SITE_URL
            VITE_SATELLITE_ID
            VITE_ORBITER_ID
            VITE_SIWA_PROVIDER_ID
          )
          for VAR in "${REQUIRED_VARS[@]}";
          do
            if [[ -z "${!VAR}" ]];
            then
              echo "$VAR is not set"
              exit 1
            fi
          done
          echo "All required variables are set"

      - id: checkout_repository
        name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - id: setup_devenv
        name: Setup Devenv
        uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-cache-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - id: cache_bun
        name: Cache Bun
        uses: ./.github/actions/cache-bun

      - id: parse_tag
        name: Parse Release Tag
        if: inputs.version != ''
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          VERSION="${VERSION%-testnet}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - id: set_version_explicit
        name: Set Version (Explicit)
        if: steps.parse_tag.outputs.version != ''
        uses: ./.github/actions/version
        with:
          mode: explicit
          version: ${{ steps.parse_tag.outputs.version }}

      - id: set_version_bump
        name: Set Version (Bump)
        if: steps.parse_tag.outputs.version == ''
        uses: ./.github/actions/version
        with:
          mode: bump

      - id: setup_juno
        name: Setup Juno
        uses: ./.github/actions/setup-juno

      - id: detect_function_changes
        name: Detect Function Changes
        run: |
          # Find the previous tag to diff against
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [[ -z "${PREV_TAG}" ]]; then
            echo "No previous tag found, assuming functions changed"
            echo "changed=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          CHANGED=$(git diff --name-only "${PREV_TAG}"...HEAD -- 'config/*.yaml' 'src/satellite/' || true)
          if [[ -z "${CHANGED}" ]]; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            echo "No function-related changes detected, skipping build/publish"
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
            echo "Function-related changes detected:"
            echo "${CHANGED}"
          fi

      - id: build_functions
        name: Build Juno Functions
        if: steps.detect_function_changes.outputs.changed == 'true'
        shell: devenv shell --quiet bash -- -e {0}
        run: |
          cargo generate-lockfile
          juno functions build

      - id: build_hosting
        name: Build Hosting
        shell: devenv shell --quiet bash -- -e {0}
        run: bun run build -- --mode staging

      - id: deploy_hosting
        name: Deploy Hosting
        uses: junobuild/juno-action@main
        with:
          args: hosting deploy --mode staging

      # NOTE: config apply requires Admin controller access.
      # OIDC automation keys are Editor/Submitter only.
      # Apply config changes locally: juno config apply --mode staging
      # - id: apply_config
      #   name: Apply Configuration
      #   uses: junobuild/juno-action@main
      #   with:
      #     args: config apply --force --mode staging

      - id: publish_functions
        name: Publish Functions
        if: steps.detect_function_changes.outputs.changed == 'true'
        uses: junobuild/juno-action@full
        with:
          args: functions publish --mode staging

      - id: get_oracle_address
        name: Get Oracle Address
        shell: devenv shell --quiet bash -- -e {0}
        env:
          SATELLITE_ID: ${{ vars.VITE_SATELLITE_ID }}
          # Safe: this is a read-only query, no cycles/ICP at risk
          DFX_WARNING: -mainnet_plaintext_identity
        run: |
          # Create anonymous identity silently to prevent seed phrase from being printed
          dfx identity new --storage-mode=plaintext anonymous-ci 2>/dev/null || true
          dfx identity use anonymous-ci 2>/dev/null

          # Call the satellite canister to get the ECDSA-derived oracle address
          ORACLE=$(dfx canister call "$SATELLITE_ID" get_oracle_address '()' --ic 2>&1) || true
          # Parse the Ok variant: (variant { Ok = "0x..." })
          ADDR=$(echo "$ORACLE" | grep -oP '0x[0-9a-fA-F]{40}' | head -1)
          if [[ -n "$ADDR" ]]; then
            echo "oracle_address=${ADDR}" >> "$GITHUB_OUTPUT"
            echo "✅ Oracle address: ${ADDR}"
          else
            echo "::warning::Could not retrieve oracle address — raw output: ${ORACLE}"
            echo "oracle_address=" >> "$GITHUB_OUTPUT"
          fi

      - id: deploy_summary
        name: Deploy Summary
        if: always()
        run: |
          SATELLITE_ID="${{ vars.VITE_SATELLITE_ID }}"
          ORACLE="${{ steps.get_oracle_address.outputs.oracle_address }}"

          {
            echo "## 🚀 Juno Deploy Summary (Testnet)"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Satellite** | \`${SATELLITE_ID}\` |"
            echo "| **Mode** | staging |"
            if [[ -n "$ORACLE" ]]; then
              echo "| **Oracle Address** | \`${ORACLE}\` |"
            else
              echo "| **Oracle Address** | ⚠️ _not retrieved_ |"
            fi
            echo ""
            echo "---"
            echo "*Deployed via \`cd-juno-testnet.yaml\` • $(date -u '+%Y-%m-%d %H:%M UTC')*"
          } >> "$GITHUB_STEP_SUMMARY"
