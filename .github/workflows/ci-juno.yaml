---
##################################################
# Name: ci-juno.yaml
# Description: Lint, type-check, and build (Juno)
##################################################

name: Juno CI

# prettier-ignore
on:  # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - main
      - master
      - trunk

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read
  pull-requests: read
  statuses: write

env:
  # GitHub
  PROJECT: ${{ github.repository }}
  BRANCH_NAME_CURRENT: ${{ github.head_ref || github.ref_name }}
  BRANCH_NAME_DEFAULT: ${{ github.event.repository.default_branch }}

  # Nix
  NIXPKGS_ALLOW_UNFREE: 1

  # SecretSpec
  SECRETSPEC_PROVIDER: env

defaults:
  run:
    shell: bash

jobs:
  ci:
    name: Lint & Build

    runs-on: ${{ matrix.os }}

    timeout-minutes: 30
    continue-on-error: false

    environment: Testnet

    strategy:
      fail-fast: true
      matrix:
        os:
          - ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-cache-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - uses: ./.github/actions/setup-juno

      - id: lint
        name: Lint
        shell: devenv shell --quiet bash -- -e {0}
        run: |
          bun run lint

      - id: build
        name: Build
        shell: devenv shell --quiet bash -- -e {0}
        run: |
          juno-dev build

      - id: build_functions
        name: Build Rust Functions
        shell: devenv shell --quiet bash -- -e {0}
        run: |
          juno-dev build-functions

      - id: build_functions_prod
        name: Build Functions (Production)
        shell: devenv shell --quiet bash -- -e {0}
        run: |
          juno functions build

      - if: always()
        uses: ./.github/actions/report-status
        with:
          result: ${{ steps.build.outcome }}
          success-description: "Juno CI passed: lint, type-check, build"
          failure-description: "Juno CI failed"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          workflow-name: ${{ github.workflow }}
          repository: ${{ github.repository }}
          sha: ${{ github.sha }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
