---
##################################################
# Name: ci-juno.yaml
# Description: Lint, type-check, and build Juno satellite
##################################################

name: Juno CI

on:
  pull_request:
    branches:
      - trunk

  merge_group:
    branches:
      - trunk

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read
  pull-requests: read
  statuses: write
  actions: write

env:
  NIXPKGS_ALLOW_UNFREE: 1
  SECRETSPEC_PROVIDER: env

defaults:
  run:
    shell: bash

jobs:
  check:
    name: Juno Lint and Build

    runs-on: ubuntu-latest

    timeout-minutes: 60
    continue-on-error: false

    defaults:
      run:
        shell: devenv shell --quiet bash -- -e {0}

    steps:
      - id: checkout_repository
        name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive
          lfs: true

      - id: setup_devenv
        name: Setup Devenv
        uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-cache-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - id: cache_bun
        name: Cache Bun
        uses: ./.github/actions/cache-bun

      - id: setup_juno
        name: Setup Juno
        uses: ./.github/actions/setup-juno

      - id: lint
        name: Lint
        run: |
          bun run lint

      - id: test
        name: Test
        run: |
          bun test

      - id: build_hosting
        name: Build Hosting
        run: |
          juno-dev build

      - id: cache_cargo
        name: Cache Cargo
        uses: ./.github/actions/cache-cargo

      - id: test_functions
        name: Test Functions (Rust)
        run: |
          cargo test --manifest-path src/satellite/Cargo.toml

      - id: build_functions
        name: Build Functions
        run: |
          cargo generate-lockfile
          juno-dev build-functions

      - id: report_status
        name: Report Status
        if: always()
        uses: ./.github/actions/report-status
        with:
          result: ${{ steps.build_hosting.outcome }}
          success-message: "Juno CI passed: lint, test, type-check, build"
          failure-message: "Juno CI failed"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          workflow-name: ${{ github.workflow }}
          repository: ${{ github.repository }}
          sha: ${{ github.sha }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
