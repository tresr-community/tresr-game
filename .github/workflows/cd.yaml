---
##################################################
# Name: cd-release.yaml
# Description: Single entrypoint for all releases
#
# Triggers:
#   - Manual dispatch → Create pre-release (Testnet) or promote to release (Mainnet)
#
# Flow:
#   1. check-cache probes the Nix store cache key (lookup-only, ~5s).
#   2. setup-environment only runs on a cache miss (~60 min warm-up).
#   3. pre-release or promote wait for both, then proceed immediately.
#      → calls cd-juno-testnet.yaml, cd-foundry-testnet.yaml
#   4. Mainnet: Promote existing pre-release tag to release
#      → calls cd-juno-mainnet.yaml, cd-foundry-mainnet.yaml
##################################################

name: Release

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - Testnet
          - Mainnet
        default: Testnet
      release_tag:
        description: "Tag to promote (Mainnet only) — leave blank to auto-promote the latest pre-release"
        required: false
        type: string
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write
  id-token: write
  packages: read
  pull-requests: write
  statuses: write

env:
  NIXPKGS_ALLOW_UNFREE: 1
  SECRETSPEC_PROVIDER: env

defaults:
  run:
    shell: bash

jobs:
  ##################################################
  # Gatekeeper - Check whether the Nix cache already exists
  # Uses lookup-only so no download occurs, just a cache API probe.
  ##################################################
  check-cache:
    name: Check Cache

    runs-on: ubuntu-latest

    timeout-minutes: 5
    continue-on-error: false

    outputs:
      cache-hit: ${{ steps.nix_cache_lookup.outputs.cache-hit }}

    steps:
      - id: checkout_repository
        name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - id: nix_cache_lookup
        name: Lookup Nix Cache
        uses: actions/cache@v5
        with:
          path: /nix
          key: ${{ runner.os }}-nix-${{ hashFiles('devenv.lock', 'devenv.nix') }}
          lookup-only: true

  ##################################################
  # Warm Cache - Only runs on a cache miss
  ##################################################
  setup-environment:
    name: Setup Environment

    needs: check-cache
    if: needs.check-cache.outputs.cache-hit != 'true'

    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - id: checkout_repository
        name: Checkout Repository
        uses: actions/checkout@v6

      - id: setup_devenv
        name: Setup Devenv
        uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-cache-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

  ##################################################
  # Create a pre-release
  # Triggers: manual dispatch with Testnet
  ##################################################
  pre-release:
    name: Pre-Release (Testnet)
    needs:
      - check-cache
      - setup-environment

    if: >-
      always() &&
      needs.check-cache.result == 'success' &&
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'Testnet'

    runs-on: ubuntu-latest
    environment: Testnet

    timeout-minutes: 120
    continue-on-error: false

    outputs:
      version: ${{ steps.compute_version.outputs.version }}
      tag: ${{ steps.compute_version.outputs.tag }}
      skip: ${{ steps.compute_version.outputs.skip }}

    steps:
      - id: checkout_repository
        name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive
          lfs: true

      - id: setup_devenv
        name: Setup Devenv
        uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-cache-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - id: compute_version
        name: Compute Version
        shell: devenv shell --quiet bash -- -e {0}
        run: |
          # Get next version from conventional commits
          NEXT_VERSION=$(convco version --bump 2>/dev/null || echo "")

          if [[ -z "${NEXT_VERSION}" ]]; then
            echo "No bump-worthy commits found (e.g. chore). Skipping release."
            NEXT_VERSION=$(convco version)
            echo "skip=true" >> "${GITHUB_OUTPUT}"
          else
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          fi

          TAG="v${NEXT_VERSION}"

          echo "version=${NEXT_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "Version: ${NEXT_VERSION}, Tag: ${TAG}"

      - id: bump_version
        name: Bump Version Files
        if: steps.compute_version.outputs.skip != 'true'
        shell: devenv shell --quiet bash -- -e {0}
        run: |
          bun run version-set ${{ steps.compute_version.outputs.version }}

      - id: create_release
        name: Create Pre-Release
        if: steps.compute_version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.compute_version.outputs.tag }}"

          # Idempotent: reuse existing pre-release if already created
          if gh release view "${TAG}" > /dev/null 2>&1; then
            echo "Pre-release ${TAG} already exists, reusing for deployment"
          else
            gh release create "${TAG}" \
              --title "Pre-Release ${TAG}" \
              --notes "Release ${TAG}" \
              --prerelease \
              --target "${{ github.sha }}"
          fi

      - id: generate_changelog
        name: Generate Changelog
        if: steps.compute_version.outputs.skip != 'true'
        shell: devenv shell --quiet bash -- -e {0}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SATELLITE_ID: ${{ vars.VITE_SATELLITE_ID }}
          ORBITER_ID: ${{ vars.VITE_ORBITER_ID }}
        run: |
          TAG="${{ steps.compute_version.outputs.tag }}"

          # Fetch the tag created by gh release so convco can see it
          git fetch --tags --force

          # Generate changelog for the latest version (the one we just tagged)
          CHANGELOG=$(convco changelog --max-versions 1 --no-links 2>/dev/null || echo "Release ${TAG}")

          {
            echo "${CHANGELOG}"
            echo ""
            echo "---"
            echo ""
            echo "## :rocket: Testnet Deployment"
            echo ""
            echo "| Resource | ID |"
            echo "|----------|-----|"
            echo "| Satellite | ${SATELLITE_ID} |"
            echo "| Orbiter | ${ORBITER_ID} |"
            echo ""
            echo ":link: [Juno Console](https://console.juno.build/)"
          } > /tmp/changelog.md

          # Update the release with the real changelog
          gh release edit "${TAG}" --notes-file /tmp/changelog.md

          echo "Updated release ${TAG} with changelog"

  ##################################################
  # Deploy to Testnet (Juno)
  ##################################################
  deploy-juno-testnet:
    name: Deploy Juno (Testnet)
    needs: pre-release
    if: always() && needs.pre-release.result == 'success' && needs.pre-release.outputs.skip != 'true'
    uses: ./.github/workflows/cd-juno-testnet.yaml
    with:
      version: ${{ needs.pre-release.outputs.tag }}
    secrets: inherit

  ##################################################
  # Deploy Solidity contracts (Testnet)
  # Runs in parallel with deploy-juno-testnet.
  # Oracle address is read directly from config/tresr.yaml (stable after bootstrap).
  ##################################################
  deploy-foundry-testnet:
    name: Deploy Contracts (Testnet)
    needs: pre-release
    if: always() && needs.pre-release.result == 'success' && needs.pre-release.outputs.skip != 'true'
    uses: ./.github/workflows/cd-foundry-testnet.yaml
    secrets: inherit

  ##################################################
  # Update config/tresr.yaml with deployed addresses (Testnet)
  ##################################################
  update-config-testnet:
    name: Update Config (Testnet)
    needs:
      - deploy-juno-testnet
      - deploy-foundry-testnet
    if: >-
      always() &&
      needs.deploy-foundry-testnet.result == 'success'

    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - id: checkout_repository
        name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          lfs: true

      - id: setup_devenv
        name: Setup Devenv
        uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-cache-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - id: update_config
        name: Update TRESR Config
        uses: ./.github/actions/update-tresr-config
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          environment: testnet
          base-ref: ${{ github.event.repository.default_branch }}
          oracle-address: ${{ needs.deploy-juno-testnet.outputs.oracle_address }}
          token-address: ${{ needs.deploy-foundry-testnet.outputs.token_address }}
          vault-address: ${{ needs.deploy-foundry-testnet.outputs.vault_address }}
          faucet-address: ${{ needs.deploy-foundry-testnet.outputs.faucet_address }}

  ##################################################
  # Promote a pre-release to release (Mainnet)
  ##################################################
  promote:
    name: Release (Mainnet)
    needs:
      - check-cache
      - setup-environment

    if: >-
      always() &&
      needs.check-cache.result == 'success' &&
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'Mainnet'

    runs-on: ubuntu-latest
    environment: Mainnet

    timeout-minutes: 120
    continue-on-error: false

    outputs:
      tag: ${{ steps.validate_tag.outputs.tag }}

    steps:
      - id: checkout_repository
        name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - id: setup_devenv
        name: Setup Devenv
        uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-cache-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - id: validate_tag
        name: Validate Release Tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          if [[ -n "${RELEASE_TAG}" ]]; then
            # User specified a tag — use it directly
            TAG="${RELEASE_TAG}"
            echo "Using provided release tag: ${TAG}"
          else
            # Auto-discover the latest pre-release
            TAG=$(gh release list --json tagName,isPrerelease \
              --jq '[.[] | select(.isPrerelease==true)] | first | .tagName' 2>/dev/null || echo "")

            if [[ -z "${TAG}" || "${TAG}" == "null" ]]; then
              echo "::error::No pre-releases found. Create one first via a Testnet deployment."
              exit 1
            fi
            echo "Auto-discovered latest pre-release: ${TAG}"
          fi

          # Verify the release exists and IS a pre-release
          RELEASE_INFO=$(gh release view "${TAG}" --json isPrerelease,tagName 2>&1) || {
            echo "::error::Release '${TAG}' not found"
            exit 1
          }

          IS_PRERELEASE=$(echo "${RELEASE_INFO}" | jq -r '.isPrerelease')
          if [[ "${IS_PRERELEASE}" != "true" ]]; then
            echo "::error::Release '${TAG}' has already been promoted to a full release."
            echo "::error::If you want to promote a specific pre-release, enter the tag (e.g. v0.2.3)."
            exit 1
          fi

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "Validated: ${TAG} is a pre-release, ready to promote"

      - id: generate_changelog
        name: Generate Release Changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SATELLITE_ID: ${{ vars.VITE_SATELLITE_ID }}
          ORBITER_ID: ${{ vars.VITE_ORBITER_ID }}
        run: |
          TAG="${{ steps.validate_tag.outputs.tag }}"

          # Get existing release body (has changelog + testnet table)
          EXISTING=$(gh release view "${TAG}" --json body -q '.body')

          {
            echo "${EXISTING}"
            echo ""
            echo "## :globe_with_meridians: Mainnet Deployment"
            echo ""
            echo "| Resource | ID |"
            echo "|----------|-----|"
            echo "| Satellite | ${SATELLITE_ID} |"
            echo "| Orbiter | ${ORBITER_ID} |"
            echo ""
            echo ":link: [Juno Console](https://console.juno.build/)"
          } > /tmp/changelog.md

          echo "Generated release changelog with mainnet deployment for ${TAG}"

      - id: promote_release
        name: Promote Pre-Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ steps.validate_tag.outputs.tag }}" \
            --prerelease=false \
            --title "Release ${{ steps.validate_tag.outputs.tag }}" \
            --notes-file /tmp/changelog.md

          echo "Promoted ${{ steps.validate_tag.outputs.tag }} to release"

  ##################################################
  # Deploy to Juno (Mainnet)
  ##################################################
  deploy-juno-mainnet:
    name: Deploy Juno (Mainnet)
    needs: promote
    if: always() && needs.promote.result == 'success'
    uses: ./.github/workflows/cd-juno-mainnet.yaml
    with:
      version: ${{ needs.promote.outputs.tag }}
    secrets: inherit

  ##################################################
  # Deploy Solidity contracts (Mainnet)
  # Runs in parallel with deploy-juno-mainnet.
  # Oracle address is read directly from config/tresr.yaml (stable after bootstrap).
  ##################################################
  deploy-foundry-mainnet:
    name: Deploy Contracts (Mainnet)
    needs:
      - promote

    if: always() && needs.promote.result == 'success'
    uses: ./.github/workflows/cd-foundry-mainnet.yaml
    secrets: inherit

  ##################################################
  # Update config/tresr.yaml with mainnet addresses
  ##################################################
  update-config-mainnet:
    name: Update Config (Mainnet)
    needs:
      - promote
      - deploy-juno-mainnet
      - deploy-foundry-mainnet

    if: >-
      always() &&
      needs.promote.result == 'success' &&
      needs.deploy-foundry-mainnet.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - id: checkout_repository
        name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          lfs: true

      - id: setup_devenv
        name: Setup Devenv
        uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-cache-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - id: update_config
        name: Update TRESR Config
        uses: ./.github/actions/update-tresr-config
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          environment: mainnet
          base-ref: ${{ github.event.repository.default_branch }}
          oracle-address: ${{ needs.deploy-juno-mainnet.outputs.oracle_address }}
          vault-address: ${{ needs.deploy-foundry-mainnet.outputs.vault_address }}
