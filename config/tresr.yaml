  wallet:
    faucet_cooldown_hours: 24
    balance_refresh_cooldown_ms: 30000
    vault_poll_interval_ms: 60000 # Vault balance background polling interval
    connect_timeout_ms: 300000 # AppKit connect wallet timeout (5 mins)
    tx_timeout_ms: 60000 # Tx receipt timeout (60 s; Fuji needs headroom over 30 s)
    tx_polling_interval_ms: 1000 # Direct RPC tx polling interval
  # Assets are auto-populated at build time by bin/client-config.ts.
  # Wallpapers: scanned from public/assets/images/wallpapers/wallpaper_*.webp
  # Music: scanned from public/assets/audio/music/*.webm
  # SFX: scanned from public/assets/audio/sfx/*.webm
  # These empty arrays serve as schema placeholders only.
  assets:
    wallpapers: []
    music: []
    sfx: []
  # Game display configuration
  display:
    width: 1920
    height: 1080
    design_height: 1080 # Baseline height that all scaleFactor values are authored against
    background_color: "#000000"
    pixel_art: true # use nearest-neighbor scaling for pixel art
  gameplay:
    time_limit_seconds: 180 # 3 minutes of Bear Market until Bull Market
    max_keys: 150
    # Difficulty escalation — scales spawn rates over the survival phase
    difficulty_escalation:
      enabled: true
      interval_seconds: 60 # Escalate every N seconds
      enemy_spawn_multiplier: 0.85 # Multiply enemy spawn delay by this each step
      bomb_spawn_multiplier: 0.90 # Multiply bomb spawn delay by this each step
      min_enemy_spawn_ms: 750 # Floor for enemy spawn delay
      min_bomb_spawn_ms: 2500 # Floor for bomb spawn delay
    # Guest rate limiting
    guest:
      enabled: true # Enable/Disable the "normie mode"
      max_sessions_per_day: 24
      storage_key: "tresr_guest_sessions"
    # Fee gate configuration
    fee_gate:
      transaction_timeout_ms: 300000 # Timeout for blockchain transaction confirmation (5 mins)
    # Claim configuration
    claim_retries:
      max_attempts: 3
      base_delay_ms: 100
    # Vault economics
    # Reference: docs/fomo.md
    vault:
      max_score: 20000
      # Below this cap, paid mode is locked out.
      minimum_cap: 1000
      tiers:
        building: 10000 # less than or equal to this number = "building"
        sweet_spot: 50000 # less than or equal to this number = "sweet_spot"
        fomo: 100000 # less than or equal to this number = "fomo"
      difficulty_multipliers:
        building: 1.0
        sweet_spot: 1.5
        fomo: 2.0
        legendary: 3.0
      payout_fixed:
        building: 500
      payout_percentages:
        sweet_spot: 10 # 10%
        fomo: 25 # 25%
        legendary: 50 # 50%
    # Global physics (shared by all entities)
    physics:
      fps: 60
      gravity: 0.75
      timestep: 0.01667 # 1/60 for 60 FPS
      game_speed: 1.5 # Global simulation speed multiplier (2.0 = double speed)
    # Global visuals
    visuals:
      shadow:
        color: 0x000000
        opacity: 0.35
        width: 105
        height: 24
        offset_x: 0 # Horizontal shadow offset (px) — 0 = directly under character
        offset_y: -45 # Negative to pull shadow UP into sprite — compensates for transparent padding below drawn feet in 512px frames
        angle: 10 # Shadow cast angle (degrees) — positive = cast right, simulates top-left light
      damage_tint_duration: 100 # Red tint flash duration (ms), applies to all entities
    # Scoring (cross-entity, stays flat)
    # Points awarded for each in-game action, used to calculate the player's final score.
    scoring:
      key_collection: 100 # Points per key collected
      enemy_kill: 10 # Points per enemy defeated
      boss_hit: 25 # Points per hit landed on the boss
      super_hit: 25 # Points per enemy hit with a super attack
    # Health bar (global, shared by all entities)
    health_bar:
      thresholds:
        high: 0.75
        medium: 0.50
        low: 0.25
        critical: 0.10
      width: 60
      height: 6
      offset_y: -15
      background_color: 0x000000
      colors:
        high: 0x00ff00
        medium: 0xffff00
        low: 0xff8800
        critical: 0xff0000
    # Walkable ground plane — the street area where characters walk
    # Values are ratios (0.0–1.0) of canvas dimensions so they scale dynamically.
    walkable_area:
      # Set top_y_ratio lower to walk higher on the screen.
      top_y_ratio: 0.85
      # Set bottom_y_ratio higher to walk lower on the screen.
      bottom_y_ratio: 1.0
      left_x_ratio: 0.0
      right_x_ratio: 1.0
    # ─── Entities ───
    entities:
      player:
        health: 1000
        damage: 25
        speed: 300
        jump_force: 25
        knockback:
          force: 200 # Knockback impulse when hit
          stun_ms: 300 # Brief immobility during knockback recovery
        hitbox:
          radius: 20
          offsetX: 236 # Center horizontally: (512 - 40) / 2
          offsetY: 472 # Near feet: 512 - 40 (origin is bottom)
        combat:
          reach: 80 # Distance player punch extends (matches enemy attack_range)
          attack_range: 80 # Hitbox radius for player attacks (matches enemy range)
          hit_stop_ms: 50 # Duration of hit stop effect on attack
        super:
          damage: 250
          splash_damage: 250
          splash_radius: 100
          speed: 500
          max_range: 1000
          charge_per_kill: 10
          max_charge: 100
          max_projectiles: 3
          hitbox:
            width: 30
            height: 50
            hit_radius: 40
            depth_threshold: 60
            fire_offset: 40
            offscreen_margin: 50
          effects:
            shake_duration: 200
            shake_intensity: 0.02
            explosion_initial_radius: 10
            explosion_expand_duration: 300
        health_bar:
          width: 50
          height: 6
          offset_y: -5
        effects:
          attack_shake_duration: 100
          attack_shake_intensity: 0.01
          victory_flash_duration: 500
        spawn:
          x_ratio: 0.039 # Just inside left edge of screen, "walking into picture..." (50/1280)
          y_ratio: 0.903 # Within walkable area midpoint of 600–700 (650/720)
        lives: 1 # Number of respawns (1 = no respawn, die once and game over)
        respawn:
          invincibility_ms: 3000 # Invincibility duration after respawn
          blink_interval_ms: 100 # Alpha blink rate during invincibility
          delay_ms: 1000 # Delay before respawn after death animation
        input:
          gamepad_deadzone: 0.2
          touch:
            joystick_radius: 50
            joystick_deadzone: 0.15
      enemy:
        health: 100
        damage: 10
        speed: 150
        flee_speed_mult: 1.5 # Multiplier applied to base speed when fleeing off-screen
        flee_margin_px: 50 # Distance outside camera bounds before fleeing enemy is killed
        offscreen_kill_distance_px: 100 # Maximum distance outside camera bounds before active enemy is killed
        walk_in_boundary_margin_px: 5 # Boundary margin padding when walking into screen
        knockback:
          force: 300 # Knockback impulse when hit by player
          stun_ms: 200 # Brief immobility during knockback recovery
        hitbox:
          radius: 18
          offsetX: 238 # Center horizontally: (512 - 36) / 2
          offsetY: 476 # Near feet: 512 - 36 (origin is bottom)
        combat:
          attack_range: 80 # Contact range for enemy damage (2.5D distance check)
          depth_threshold: 40 # Max groundY difference for enemy attack to connect
          attack_check_ms: 500 # How often to check for enemy attacks
        # Enemy AI behaviour profiles.
        # Each enemy is randomly assigned a behaviour at spawn based on the weights below.
        ai:
          # Cautious
          #   - Strafes laterally at preferred distance when solo.
          #   - Once enough allies gather nearby (pack_threshold), charges in.
          #   - If allies die mid-charge and count drops, retreats to strafe.
          cautious:
            speed_mult: 0.7
            preferred_distance: 250
            group_radius: 200
            pack_threshold: 4
            charge_speed_mult: 1.3
            strafe_speed_mult: 0.9 # Lateral strafe speed when solo
            strafe_switch_time: 2.0 # Seconds between strafe direction changes
            check_frame_interval: 10 # Frames between AI checks
          # Direct
          #   - Charges straight at the player with no special movement.
          #   - Simple but effective in groups. Bread and butter enemy.
          direct: {}
          # Erratic
          #   - Snakes toward the player with continuous sine-wave zigzag.
          #   - Visibly weaves side-to-side — hard to track and predict.
          erratic:
            speed_mult: 1.2
            zigzag_frequency: 1.5 # Sine oscillations per second
            zigzag_amplitude: 1.5 # Radians of lateral swing
            jitter_x: 80
            jitter_y: 40
          # Flanker
          #   - Orbits the player at a set radius, then lunges in to attack.
          #   - Creates a circling-then-striking pattern that feels distinct.
          flanker:
            speed_mult: 1.1
            offset: 200 # Orbit radius (px)
            switch_time: 3 # Seconds between flank direction switches
            orbit_time: 2.0 # Seconds to orbit before lunging
            lunge_speed_mult: 2.5 # Speed multiplier during lunge dash
            lunge_duration: 0.3 # Seconds of lunge dash
            recovery_time: 0.8 # Seconds to back off after attacking
          # Passive ("The Banker")
          #   - Walks slowly across the screen, minding its own business.
          #   - Only attacks if the player hits it first (return fire mode).
          #   - Higher HP, better loot — a risk/reward choice for the player.
          passive:
            speed_mult: 0.5
            provoked_speed_mult: 1.3
            hp_mult: 1.5
          # Retardio
          #   - Rare, chaotic enemy that attacks OTHER enemies.
          #   - Walks around erratically punching bankers. Can be killed.
          retardio:
            speed_mult: 1.1
            jitter_time: 0.3
            retarget_time: 4
            attack_damage: 10
            attack_cooldown_s: 0.5
            rage_tint: 0xff0000 # Red glow when hunting another enemy
          # Swarm
          #   - Clusters with nearby allies.
          #   - When rush_threshold allies are nearby, triggers the "hulk" green rush.
          swarm:
            speed_mult: 1.0
            group_radius: 150
            speed_bonus_per_ally: 0.15
            max_speed_mult: 2.0
            rush_threshold: 3 # Allies needed for coordinated rush
            rush_tint: 0x00ff88 # Green glow when rushing
            check_frame_interval: 10 # Frames between AI checks
          weights:
            cautious: 10
            direct: 20
            erratic: 20
            flanker: 20
            passive: 10
            retardio: 10
            swarm: 10
        health_bar:
          width: 30
          height: 4
          offset_y: -5
        animations:
          death_delay: 500 # Delay before kill() after hurt animation (ms)
        spawner:
          pool_size: 50 # Max enemies in the object pool
          delay_ms: 2500 # Interval between enemy spawns (ms)
          buffer_distance: 50 # Spawn distance beyond screen edge (px)
          director:
            burst_chance: 0.15 # 15% chance an intended normal spawn turns into a burst
            burst_count_min: 3
            burst_count_max: 7
            burst_delay_ms: 300 # spawn very fast during a burst
            breather_chance: 0.20 # 20% chance after any normal/burst spawn to pause
            breather_duration_ms: 5000 # 5 seconds of breather
            # A "bus" full of bankers arrives. But rich bankers ride in limos.
            limo_chance: 0.05 # 5% chance instead of normal spawn to spawn a banker limo.
            limo_count: 5 # 5 Bankers in one Limo
        loot:
          health:
            drop_chance: 0.25 # 25% chance to drop health on death
            heal_amount: 25 # HP restored when player picks up a health drop
            variants: 5 # Number of health_X entity variants available
          powerup:
            drop_chance: 0.10 # 10% chance to drop power-up
            variants: 5 # Number of powerup_X entity variants available
          hitbox:
            width: 400 # Collision body width (px, unscaled frame-local)
            height: 400 # Collision body height (px, unscaled frame-local)
          pool_size: 20 # Max loot items in the object pool
          bob_distance: 8 # Pixels for bobbing animation
          bob_duration: 600 # Duration of bob cycle (ms)
          despawn_ms: 8000 # Auto-despawn time (ms)
      boss:
        health: 500
        damage: 25
        speed: 150
        knockback:
          force: 50 # Boss is heavy — minimal knockback
          force_mult: 0.5 # Knockback applied during normal hits
          stun_ms: 100
        hitbox:
          radius: 20
          offsetX: 236 # Center horizontally: (512 - 40) / 2
          offsetY: 472 # Near feet: 512 - 40 (origin is bottom)
        combat:
          attack_range: 60 # Contact range for boss damage (larger)
          contact_depth_threshold: 60 # Max groundY difference for boss contact damage
        descent:
          speed: 3 # Speed at which boss descends from above
          start_y: -100
          threshold_ratio: 0.903 # groundY ratio at which boss starts fighting (650/720)
        # TODO: This needs improvements.
        # Boss enters Phase 2 (enrage) when HP drops below the threshold
        phases:
          enrage_threshold: 0.5 # HP percentage to trigger Phase 2 (50%)
          phase2_speed_mult: 2.0 # Speed multiplier during enrage
          phase2_damage_mult: 2.0 # Damage multiplier during enrage
          enrage_tint: 0xff0000
        # Special attacks the boss cycles through between normal melee
        attacks:
          # Ground Pound: AoE slam that damages all nearby players
          ground_pound:
            damage: 15 # Damage dealt to player within radius
            radius: 120 # AoE radius in pixels
            windup_ms: 800 # Telegraph delay before impact (ms)
            cooldown_ms: 5000 # Time before ground pound can be used again (ms)
          # Charge: Boss rushes across the arena at high speed
          charge:
            speed_mult: 4.0 # Speed multiplier during charge
            damage: 20 # Damage on contact during charge
            duration_ms: 1000 # How long the charge lasts (ms)
            cooldown_ms: 7000 # Time before charge can be used again (ms)
          # Summon: Spawns a wave of enemies mid-fight
          summon:
            count: 3 # Number of enemies spawned per summon
            cooldown_ms: 10000 # Time before summon can be used again (ms)
        attack_cooldown_ms: 3000
        charge_range_mult: 2 # Attack range multiplier during charge
        summon_pause_s: 0.5 # Brief pause during summon
        defeated_alpha: 0.5 # Alpha when defeated
        enrage_flash_ms: 200 # Flash duration on phase transition
        # Screen shake and expanding ring VFX when ground pound lands
        ground_pound_effects:
          shake_duration: 200 # Camera shake length (ms)
          shake_intensity: 0.01 # Camera shake strength (fraction of screen)
          ring_initial_radius: 10 # Starting radius of the shockwave ring (px)
          ring_expand_duration: 400 # Time for ring to expand to full size (ms)
        # Screen shake, flash, and tint VFX when boss dies
        death_effects:
          shake_duration: 300 # Camera shake length (ms)
          shake_intensity: 0.025 # Camera shake strength (fraction of screen)
          flash_duration: 200 # Screen flash length (ms)
          flash_r: 255 # Flash color red channel (0-255)
          flash_g: 200 # Flash color green channel (0-255)
          flash_b: 100 # Flash color blue channel (0-255)
        health_bar:
          width: 80
          height: 8
          offset_y: -10
        animations:
          death_delay: 1000 # Delay before kill() after death animation (ms)
      key:
        speed: 80 # Wind drift amplitude (px) — key swings ±80px around spawn X
        gravity: 0.04 # Very low gravity — parachute resists freefall, drag does the work
        terminal_vz: 1.5 # Slow terminal fall speed (px/frame-unit) — floaty airdrop descent
        drag: 0.12 # High air drag — quickly reaches slow terminal velocity, prevents acceleration
        wind_frequency: 0.4 # Slow wind oscillation (radians/sec) — large back-and-forth swing
        bounce_threshold: 0.3 # Soft landing threshold — parachute means minimal bounce needed
        oscillation:
          frequency: 3 # Fast canopy wobble (radians/sec)
          amplitude: 18 # Slightly more canopy wobble for visible parachute sway
        bounce_damping: 0.2
        offscreen_kill_distance: 200
        animations:
          fade_duration: 500
          fade_delay: 3000
        spawner:
          pool_size: 20
          delay_ms: 2000
          start_z: 800 # Must exceed max groundY (~700) so keys enter from above the screen
          x_margin: 100
          y_margin_top_ratio: 0.833 # Top of walkable area ratio (must match walkable_area.top_y_ratio)
          y_margin_bottom_ratio: 0.035 # Bottom margin ratio from screen edge (25/720)
      # Bombs fall from the sky and explode on landing, damaging the player
      bomb:
        damage: 50 # Damage dealt to player caught in explosion
        explosion_radius: 250 # Blast radius in pixels
        hitbox:
          width: 25 # Collision box width (px)
          height: 25 # Collision box height (px)
        effects:
          shake_duration: 150 # Camera shake length on explosion (ms)
          shake_intensity: 0.015 # Camera shake strength (fraction of screen)
          explosion_scale: 0.2
          explosion_duration: 300
          explosion_tint: 0xff6600
          explosion_alpha: 0.5
        spawner:
          pool_size: 10 # Max bombs in the object pool
          delay_ms: 5000 # Interval between bomb drops (ms)
          start_z: 800 # Must exceed max groundY (~700) so bombs enter from above the screen
          x_margin: 100 # Horizontal margin from screen edges for spawn (px)
          y_margin_top_ratio: 0.833 # Top of walkable area ratio (must match walkable_area.top_y_ratio)
          y_margin_bottom_ratio: 0.035 # Bottom margin ratio from screen edge (25/720)
      # Treasure chest that air-drops after the boss is defeated
      chest:
        fallback_tint: 0x00ff00
        combat:
          interact_range: 100 # Distance the player must be within to open (px)
        # VFX when the chest lands after air-drop
        air_drop:
          delay_after_boss_ms: 1000 # Delay after boss death before chest drops (ms)
          landing_flash_color: 0x00ff88 # Screen flash color on landing
          landing_flash_ms: 300 # Screen flash duration (ms)
          landing_dust_color: 0xccaa44 # Dust particle color on impact
          landing_dust_radius: 80 # Dust cloud radius (px)
          landing_dust_duration_ms: 400 # Dust cloud fade time (ms)
          landing_shake_duration: 150 # Camera shake length on landing (ms)
          landing_shake_intensity: 0.01 # Camera shake strength (fraction of screen)
      # TRESR Bot — AI companion that air-drops mid-game to fight alongside the player
      tresr_bot:
        health: 500 # Bot HP
        damage: 50 # Melee damage per hit
        speed: 180 # Movement speed (px/s)
        # VFX when the bot lands after air-drop
        air_drop:
          landing_flash_color: 0x00ff88 # Screen flash color on landing
          landing_flash_ms: 500 # Screen flash duration (ms)
          landing_dust_color: 0x888888 # Dust particle color on impact
          landing_dust_radius: 60 # Dust cloud radius (px)
          landing_dust_duration_ms: 300 # Dust cloud fade time (ms)
          landing_shake_duration: 100 # Camera shake length on landing (ms)
          landing_shake_intensity: 0.005 # Camera shake strength (fraction of screen)
        knockback:
          force: 120 # Knockback force applied to enemies on hit
          stun_ms: 200 # Stun duration on knocked-back enemies (ms)
        hitbox:
          radius: 13 # Collision circle radius (px)
          offsetX: 193 # Center horizontally: (512 - 26) / 2
          offsetY: 361 # Near feet: scaled from 1000→512
        combat:
          attack_range: 80 # Distance to engage enemies (px)
          attack_cooldown_ms: 800 # Minimum time between attacks (ms)
          target_switch_ms: 2000 # How often the bot picks a new target (ms)
          follow_distance: 80 # Distance from owner before bot follows (px)
          follow_speed_mult: 0.7 # Speed multiplier when following owner (fraction of base speed)
        lifetime:
          duration_ms: 30000 # Total time the bot stays alive (ms)
          fade_duration_ms: 1500 # Fade-out duration before despawn (ms)
          spawn_flash_ms: 500 # Flash effect duration on spawn (ms)
        # AoE special attack — triggers when enough enemies are clustered nearby
        special:
          cooldown_ms: 10000 # Minimum time between special attacks (ms)
          damage: 100 # Damage dealt to each enemy in radius
          radius: 120 # AoE radius (px)
          min_enemies: 3 # Minimum enemies in range to trigger special
        max_concurrent: 1 # Max bots active at the same time
        max_drops_per_game: 5 # Max bot air-drops per game session
    # Combat tuning (cross-entity values)
    combat:
      enemy_damage_cooldown_ms: 500 # Minimum ms between damage ticks per enemy
      enemy_spawn_offscreen_px: 80 # Off-screen distance for enemy spawn
      boss_melee_range_bonus: 20 # Extra hitbox range for player attacks on boss
      projectile_hit_radius: 40 # Impact radius for projectiles
    # Phase announcement overlay
    announcements:
      font: "80px Orbitron" # Font family and size for phase text
      color: "#00ff00" # Text fill color
      stroke_color: "#000000" # Text outline color
      stroke_thickness: 8 # Text outline width (px)
      enter_duration: 500 # Fade-in time (ms)
      display_duration: 2000 # How long the text stays on screen (ms)
      exit_duration: 500 # Fade-out time (ms)
    # Audio configuration
    audio:
      default_music_volume: 0.75 # Initial music volume (0.0 - 1.0)
      default_sfx_volume: 0.5 # Initial SFX volume (0.0 - 1.0)
      crossfade_duration_ms: 2000 # Total time to crossfade between tracks (ms)
      crossfade_step_ms: 50 # Interval between volume steps during crossfade (ms)
      preference_save_debounce_ms: 2000 # Debounce delay before persisting volume prefs (ms)
      # sfx_variants are auto-detected at build time by bin/client-config.ts
      # from the SFX files scanned in public/assets/audio/sfx/.
      # Files follow naming convention: {type}_{number}.webm (contiguous from 1).
      # Adding/removing files automatically updates variant counts on rebuild.
      sfx_variants: {}
      # Per-type SFX volume multipliers applied on top of the global sfxVolume.
      # 1.0 = no change. Tune these to balance loud/quiet sounds without re-exporting files.
      sfx_volume_overrides:
        bot_attack: 1.0
        bot_spawn: 1.0
        bot_special: 1.0
        countdown: 1.0
        death: 1.0
        explosion: 1.0
        game_over: 1.0
        hurt: 1.0
        key_collect: 1.0
        open_treasure_chest: 1.0
        powerup_collect: 1.0
        punch: 1.0
        victory: 1.0
    # Loading screen configuration (cinematic intro)
    # mode: "sprite" = old spritesheet coin, "video" = animated WebP video
    loading_screen:
      # mode: sprite
      mode: video
      spinner:
        y_offset: -60
      video:
        path: /assets/videos/loader.webp
        # Scale relative to canvas height (0.0–1.0). 0.4 = 40% of screen height.
        scale: 0.4
        y_offset: -60
  # Sprite configuration for characters and items
  # Each sprite uses row-based animations in a spritesheet
  sprites:
    # Default frame dimensions (can be overridden per-sprite)
    defaults:
      frameWidth: 512
      frameHeight: 512
    # All sprites use per-animation sheets (one row per file).
    # Each anim entry has: path, frameWidth, frameHeight, frames, frameRate, repeat.

    # Hero character (Ron Jay)
    hero:
      scaleFactor: 0.8
      anims:
        - name: idle
          frames: 6
          frameRate: 6
          repeat: -1
          path: /assets/images/sprites/hero/idle.webp
          frameWidth: 512
          frameHeight: 512
        - name: walk
          frames: 6
          frameRate: 8
          repeat: -1
          path: /assets/images/sprites/hero/walk.webp
          frameWidth: 512
          frameHeight: 512
        - name: jump
          frames: 6
          frameRate: 10
          repeat: 0
          path: /assets/images/sprites/hero/jump.webp
          frameWidth: 512
          frameHeight: 512
        - name: attack
          frames: 6
          frameRate: 10
          repeat: 0
          path: /assets/images/sprites/hero/attack.webp
          frameWidth: 512
          frameHeight: 512
        - name: hurt
          frames: 4
          frameRate: 8
          repeat: 0
          path: /assets/images/sprites/hero/hurt.webp
          frameWidth: 512
          frameHeight: 512
        - name: super
