---
##################################################
# Server side configuration.
#
# Injected Astro during build time from config/config-server.json
##################################################
server:
  juno:
    development:
      satellite_id: "${VITE_DEVELOPMENT_SATELLITE_ID}"
      orbiter_id: "${VITE_DEVELOPMENT_ORBITER_ID}"
    staging:
      satellite_id: "${VITE_STAGING_SATELLITE_ID}"
      orbiter_id: "${VITE_STAGING_ORBITER_ID}"
    production:
      satellite_id: "${VITE_PRODUCTION_SATELLITE_ID}"
      orbiter_id: "${VITE_PRODUCTION_ORBITER_ID}"
    # Admin principals allowed to access the /admin interface and error logs.
    # Add your Internet Identity / SIWA principal text here.
    admins:
      # Development (Local)
      - "pegnp-gazih-6vb6n-cze6g-gei4h-y3dlc-i77bm-7ityv-rmome-rshwy-wqe"
      # Staging (Testnet)
      - "3n3c2-3pc3z-enxej-thoeh-glav5-ii4fc-itegf-wpru2-erb6e-ivawj-zqe"
      # Production (Mainnet)
    collections:
      datastore:
        # Audit
        #   - Private admin collection for auditing blockchain transactions mapped to users.
        - collection: "audit"
          read: "managed"
          write: "managed"
          memory: "stable"
        # Scores
        #   - Public collection for leaderboard entries per user and the top_scorer cache.
        - collection: "scores"
          read: "public"
          write: "managed"
          memory: "stable"
        # Users
        #   - Private collection for per-user preferences (nickname, avatar, wallet, settings).
        - collection: "users"
          read: "managed"
          write: "managed"
          memory: "stable"
        # Claims
        #   - Private collection for tracking user reward claims on the blockchain.
        - collection: "claims"
          read: "managed"
          write: "managed"
          memory: "stable"
        # Errors
        #   - Private admin-only collection for error tracking.
        #   - Satellite functions write here; clients cannot read or write directly.
        - collection: "errors"
          read: "managed"
          write: "managed"
          memory: "stable"
      storage:
        # Images
        #   - Public images like Avatars
        - collection: "images"
          read: "public"
          write: "managed"
          memory: "stable"
  anti_cheat:
    ban_durations_hours:
      - 24
      - 72
      - 168
    permanent_after_offence: 4
    ban_reasons:
      - config_hash_mismatch
      - is_a_sore_loser
      - replay_validation_failure
      - score_exceeds_maximum
      - wallet_tampering
    replay:
      max_actions: 50000
      min_action_gap_ms: 0
      min_attack_gap_ms: 200
      grace_ms: 5000
  highscore:
    score_ttl_hours: 24
    consolation_prize_percent: 1
    consolation_prize_min_games: 3

##################################################
# Client side configuration.
#
# Read from typescript at public/config-client.json
##################################################
client:
  daisyui:
    themes:
      - abyss
      - aqua
      - black
      - bumblebee
      - business
      - cmyk
      - coffee
      - corporate
      - cyberpunk
      - dark
      - dim
      - dracula
      - fantasy
      - forest
      - halloween
      - lemonade
      - light
      - luxury
      - night
      - retro
      - sunset
      - synthwave
      - valentine
      - winter
  auth:
    iid:
      enabled: false
      domain: id.ai
    webauthn:
      enabled: false
      session_ttl_ms: 14400000 # 4 hours in milliseconds
    avalanche:
      enabled: true
  app:
    name: TRESR Game
    description: Beat up bankers to claim the $TRESR.
    tagline: Collect Keys. Fight Enemies. Claim the $TRESR.
    #footer_text: Powered by the Internet Computer ♾️ and Avalanche 🔺
    footer_text: Powered by Avalanche 🔺
    narration_text:
      intro: |
        Yo, I'm Ron Jay — full-time degen, airdrop farmer,
        meme-coin maniac and diamond-handed legend.

        These suit-wearing bankers think they can gatekeep crypto forever.

        The streets are dead quiet tonight.

        But not for long.

        Grab your fists, let's send these clowns to zero!
    loader_messages:
      - Aping In...
      - Boarding Yacht...
      - Bridging Assets...
      - Checking Mempool...
      - Deploying Smart Contracts...
      - Extracting Yield...
      - Farming Airdrops...
      - Flipping NFTs...
      - HODLing...
      - Liquidating Shorts...
      - Minting Blocks...
      - Preparing to Rug...
      - Pumping Bags...
      - Stacking Sats...
      - Deploying more capital - steady lads...
      - Updating Roadmap...
      - Yield Farming...
    custom_notifications:
      - No Lambos
      - No farming notices today
      - No forks
      - No gems
      - No mints
      - No moonshots
      - No new airdrops
      - No pumps have happened today
      - No rugs
    custom_404: |
      404, degen not found.
    instructions: |
      ## 🎯 Mission

      Your mission, should you choose to accept it;

      - ⚔️ Defeat enemies for points
      - 🚀 Collect keys to multiply rewards
      - ⏱️ Survive the time limit
      - 👑 Defeat the final boss
      - 💎 And finally, open the treasure chest for your **$TRESR** reward!

      ## 🎮 Controls

      **Keyboard** (both schemes active simultaneously):

      | Action       | WASD Scheme | Arrow Scheme |
      |--------------|-------------|--------------|
      | Move         | W/A/S/D     | Arrow Keys   |
      | Jump         | Space       | Space        |
      | Attack       | J           | Z            |
      | Super Attack | K           | X            |
      | Pause        | Escape      | Escape       |

      **Gamepad**:

      | Action       | Button               |
      |--------------|---------------------- |
      | Move         | Left Stick / D-Pad    |
      | Jump         | A (Xbox) / Cross (PS) |
      | Attack       | X (Xbox) / Square (PS)|
      | Super Attack | RB (Xbox) / R1 (PS)   |

      **Touch**:

      - Virtual joystick on left half of screen for movement
      - Right side control for attack, jump and super.

      ## 💰 Economy

      - 💵 Pay a fee in **$TRESR** to start your epic adventure
      - 🔑 Keys boost your rewards big time
      - 🏆 Beat the boss to claim the **$TRESR** prize
      - ⚠️ **Warning:** Die and lose your **TRESR** Stay alive! 💀
  blockchain:
    # NOTE: The vault_contract is the proxy smart contract address.
    avalanche:
      anvil:
        url: http://auamu-4x777-77775-aaaaa-cai.localhost:5987
        fee: 100 # Fee in tokens to play
        burn_rate: 1000 # 10% in basis points — must match Vault.sol burnRate
        chain_id: 31337 # Standalone Anvil (no fork)
        rpc_urls:
          - http://localhost:8545
        allowed_origins:
          - http://localhost:5173
          - http://localhost:4943
          - http://auamu-4x777-77775-aaaaa-cai.localhost:5987
          - http://rdmx6-jaaaa-aaaaa-aaadq-cai.localhost:5987
        token_ticker: "tRON"
        tresr_token_contract: "0x7a2088a1bFc9d81c55368AE168C2C02570cB814F"
        deployer_address: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
        vault_contract: "0x9E545E3C0baAB3E08CdfD552C960A1050f373042"
        faucet_contract: "0x67d269191c92Caf3cD7723F116c85e6E9bf55933"
