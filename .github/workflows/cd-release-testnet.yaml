---
##################################################
# Name: cd-release-testnet.yaml
# Description: Release entrypoint for Testnet
#
# Triggers:
#   - Push to trunk → Create pre-release (automatic)
#   - Manual dispatch → Create pre-release
#
# Flow:
#   1. Compute next version via convco (or use version_override)
#   2. Bump version in package.json, manifest.json, Cargo.toml
#   3. Tag as v{version}, create pre-release
#   4. Deploy Juno (staging) → get oracle_address
#   5. Deploy Foundry (testnet) → get contract addresses
#   6. Update config/tresr.yaml via PR if addresses changed
##################################################

name: Release (Testnet)

on:
  push:
    branches:
      - trunk

  workflow_dispatch:
    inputs:
      version_override:
        description: "Force a specific version (e.g. 0.3.0 or v0.3.0)"
        required: false
        type: string
        default: ""

concurrency:
  group: release-testnet-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write
  packages: read
  pull-requests: write
  statuses: write

env:
  NIXPKGS_ALLOW_UNFREE: 1
  SECRETSPEC_PROVIDER: env

defaults:
  run:
    shell: bash

jobs:
  ##################################################
  # Create a pre-release
  ##################################################

  pre-release:
    name: Pre-Release

    runs-on: ubuntu-latest
    environment: Testnet

    timeout-minutes: 60
    continue-on-error: false

    outputs:
      version: ${{ steps.compute_version.outputs.version }}
      tag: ${{ steps.compute_version.outputs.tag }}
      skip: ${{ steps.compute_version.outputs.skip }}

    steps:
      - id: checkout_repository
        name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - id: setup_devenv
        name: Setup Devenv
        uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - id: compute_version
        name: Compute Version
        shell: devenv shell --quiet bash -- -e {0}
        run: |
          OVERRIDE="${{ github.event.inputs.version_override }}"

          if [[ -n "${OVERRIDE}" ]]; then
            # Strip leading 'v' if present and validate
            NEXT_VERSION="${OVERRIDE#v}"

            if ! [[ "${NEXT_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
              echo "::error::Invalid version format: '${OVERRIDE}'. Expected semver (e.g. 0.3.0 or v0.3.0)"
              exit 1
            fi

            echo "Using manual version override: ${NEXT_VERSION}"
          else
            # Get next version from conventional commits
            NEXT_VERSION=$(convco version --bump 2>/dev/null || echo "")

            if [[ -z "${NEXT_VERSION}" ]]; then
              echo "No conventional commits found to bump version"
              NEXT_VERSION=$(convco version)
            fi
          fi

          TAG="v${NEXT_VERSION}"

          # Check if tag already exists
          if git tag --list | grep -q "^${TAG}$"; then
            echo "Tag ${TAG} already exists, skipping release"
            echo "skip=true" >> "${GITHUB_OUTPUT}"
          else
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          fi

          echo "version=${NEXT_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "Version: ${NEXT_VERSION}, Tag: ${TAG}"

      - id: bump_version
        name: Bump Version Files
        if: steps.compute_version.outputs.skip != 'true'
        shell: devenv shell --quiet bash -- -e {0}
        run: |
          bun run version-set ${{ steps.compute_version.outputs.version }}

      - id: create_release
        name: Create Pre-Release
        if: steps.compute_version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.compute_version.outputs.tag }}" \
            --title "Pre-Release ${{ steps.compute_version.outputs.tag }}" \
            --notes "Release ${{ steps.compute_version.outputs.tag }}" \
            --prerelease \
            --target "${{ github.sha }}"

      - id: generate_changelog
        name: Generate Changelog
        if: steps.compute_version.outputs.skip != 'true'
        shell: devenv shell --quiet bash -- -e {0}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SATELLITE_ID: ${{ vars.VITE_SATELLITE_ID }}
          ORBITER_ID: ${{ vars.VITE_ORBITER_ID }}
        run: |
          TAG="${{ steps.compute_version.outputs.tag }}"

          # Fetch the tag created by gh release so convco can see it
          git fetch --tags --force

          # Generate changelog for the latest version (the one we just tagged)
          CHANGELOG=$(convco changelog --max-versions 1 --no-links 2>/dev/null || echo "Release ${TAG}")

          {
            echo "${CHANGELOG}"
            echo ""
            echo "---"
            echo ""
            echo "## :rocket: Testnet Deployment"
            echo ""
            echo "| Resource | ID |"
            echo "|----------|-----|"
            echo "| Satellite | ${SATELLITE_ID} |"
            echo "| Orbiter | ${ORBITER_ID} |"
            echo ""
            echo ":link: [Juno Console](https://console.juno.build/)"
          } > /tmp/changelog.md

          # Update the release with the real changelog
          gh release edit "${TAG}" --notes-file /tmp/changelog.md

          echo "Updated release ${TAG} with changelog"

  ##################################################
  # Deploy to Testnet (Juno)
  #
  # NOTE: No skip gate — Juno must always redeploy
  # so config-only merges (2nd pass) pick up new
  # contract addresses in config/tresr.yaml.
  ##################################################

  deploy-juno-testnet:
    name: Deploy Juno (Testnet)
    needs: pre-release
    uses: ./.github/workflows/cd-juno-testnet.yaml
    with:
      version: ${{ needs.pre-release.outputs.tag }}
    secrets: inherit

  ##################################################
  # Deploy Solidity contracts (Testnet)
  ##################################################

  deploy-foundry-testnet:
    name: Deploy Contracts (Testnet)
    needs: [pre-release, deploy-juno-testnet]
    if: needs.pre-release.outputs.skip != 'true'
    uses: ./.github/workflows/cd-foundry-testnet.yaml
    with:
      oracle_address: ${{ needs.deploy-juno-testnet.outputs.oracle_address }}
    secrets: inherit

  ##################################################
  # Update config/tresr.yaml with deployed addresses
  ##################################################

  update-config:
    name: Update Config
    needs: [pre-release, deploy-juno-testnet, deploy-foundry-testnet]
    if: >-
      always() &&
      needs.pre-release.outputs.skip != 'true' &&
      needs.deploy-foundry-testnet.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - id: checkout_repository
        name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: trunk

      - id: update_config
        name: Update TRESR Config
        uses: ./.github/actions/update-tresr-config
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          environment: testnet
          oracle-address: ${{ needs.deploy-juno-testnet.outputs.oracle_address }}
          token-address: ${{ needs.deploy-foundry-testnet.outputs.token_address }}
          vault-address: ${{ needs.deploy-foundry-testnet.outputs.vault_address }}
          faucet-address: ${{ needs.deploy-foundry-testnet.outputs.faucet_address }}
