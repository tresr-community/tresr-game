---
##################################################
# Name: ci.yaml
# Description: Gatekeeper entrypoint for CI checks
#
# Triggers:
#   - Pull requests to trunk
#   - Merge queues
#
# Flow:
#   1. check-cache does a lookup-only probe of the Nix store cache key.
#   2. If cache exists (hit), setup-environment is skipped entirely.
#   3. If cache is missing, setup-environment runs first to warm it.
#   4. All parallel CI jobs start as soon as check-cache finishes,
#      waiting for setup-environment only when it actually ran.
##################################################

name: CI

on:
  pull_request:
    branches:
      - trunk

  merge_group:
    branches:
      - trunk

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read
  pull-requests: write
  security-events: write
  statuses: write
  actions: write

defaults:
  run:
    shell: bash

env:
  NIXPKGS_ALLOW_UNFREE: 1
  SECRETSPEC_PROVIDER: env

jobs:
  ##################################################
  # Gatekeeper - Check whether the Nix cache already exists
  # Uses lookup-only so no download occurs, just a cache API probe.
  ##################################################
  check-cache:
    name: Check Cache

    runs-on: ubuntu-latest

    timeout-minutes: 5
    continue-on-error: false

    outputs:
      cache-hit: ${{ steps.nix_cache_lookup.outputs.cache-hit }}

    steps:
      - id: checkout_repository
        name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - id: nix_cache_lookup
        name: Lookup Nix Cache
        uses: actions/cache@v5
        with:
          path: /nix
          key: ${{ runner.os }}-nix-${{ hashFiles('devenv.lock', 'devenv.nix') }}
          lookup-only: true

  ##################################################
  # Warm Cache - Only runs on a cache miss
  ##################################################
  setup-environment:
    name: Setup Environment

    needs: check-cache
    if: needs.check-cache.outputs.cache-hit != 'true'

    runs-on: ubuntu-latest

    timeout-minutes: 120
    continue-on-error: false

    steps:
      - id: checkout_repository
        name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - id: setup_devenv
        name: Setup Devenv
        uses: ./.github/actions/setup-devenv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-cache-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skip-push: "false"

  ##################################################
  # Parallel Check - Devenv test
  ##################################################
  ci-devenv:
    name: Check Devenv
    needs:
      - check-cache
      - setup-environment

    if: always() && needs.check-cache.result == 'success'
    uses: ./.github/workflows/ci-devenv.yaml
    secrets: inherit

  ##################################################
  # Parallel Check - Foundry format & tests
  ##################################################
  ci-foundry:
    name: Check Foundry
    needs:
      - check-cache
      - setup-environment

    if: always() && needs.check-cache.result == 'success'
    uses: ./.github/workflows/ci-foundry.yaml
    secrets: inherit

  ##################################################
  # Parallel Check - Juno build & tests
  ##################################################
  ci-juno:
    name: Check Juno
    needs:
      - check-cache
      - setup-environment

    if: always() && needs.check-cache.result == 'success'
    uses: ./.github/workflows/ci-juno.yaml
    secrets: inherit

  ##################################################
  # Parallel Check - PR Title
  ##################################################
  ci-pr-title:
    name: Check PR Title
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/ci-pr-title.yaml
    secrets: inherit

  ##################################################
  # Status Report Aggregator
  ##################################################
  status:
    name: CI Status
    needs:
      - check-cache
      - ci-pr-title
      - ci-devenv
      - ci-foundry
      - ci-juno
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - id: checkout_repository
        name: Checkout Repository
        uses: actions/checkout@v7

      - id: write_summary
        name: Write Results Summary
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_HEAD: ${{ github.head_ref }}
          PR_BASE: ${{ github.base_ref }}
        run: |
          status_emoji() {
            case "$1" in
              success)   echo "✅" ;;
              failure)   echo "❌" ;;
              cancelled) echo "⛔" ;;
              skipped)   echo "⏭️" ;;
              *)         echo "⏳" ;;
            esac
          }

          {
            echo "## CI Results"
            echo ""
            if [ "${{ github.event_name }}" == "pull_request" ]; then
              echo "> **PR #${PR_NUMBER}** — ${PR_TITLE}"
              echo "> _${PR_HEAD} → ${PR_BASE}_"
              echo ""
            fi
            echo "| Job | Status |"
            echo "|-----|--------|"
            if [ "${{ github.event_name }}" == "pull_request" ]; then
              echo "| PR Title | $(status_emoji '${{ needs.ci-pr-title.result }}') ${{ needs.ci-pr-title.result }} |"
            fi
            echo "| Devenv | $(status_emoji '${{ needs.ci-devenv.result }}') ${{ needs.ci-devenv.result }} |"
            echo "| Foundry | $(status_emoji '${{ needs.ci-foundry.result }}') ${{ needs.ci-foundry.result }} |"
            echo "| Juno | $(status_emoji '${{ needs.ci-juno.result }}') ${{ needs.ci-juno.result }} |"
            echo ""
            if [ "${{ needs.check-cache.outputs.cache-hit }}" == "true" ]; then
              echo "💚 **Nix Cache: HIT** — setup-environment was skipped"
            else
              echo "🔴 **Nix Cache: MISS** — setup-environment ran (~60 min warm-up)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - id: check_failures
        name: Check for Failures
        run: |
          ALL_JOBS="${{ needs.ci-pr-title.result }},${{ needs.ci-devenv.result }},${{ needs.ci-foundry.result }},${{ needs.ci-juno.result }}"

          if echo "${ALL_JOBS}" | grep -qE "(failure|cancelled)"; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi

          echo "All CI checks passed!"

      - id: report_status
        name: Report Status
        if: always()
        uses: ./.github/actions/report-status
        with:
          result: ${{ steps.check_failures.outcome }}
          success-message: "All CI checks passed!"
          failure-message: "One or more CI checks failed!"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          workflow-name: ${{ github.workflow }}
          repository: ${{ github.repository }}
          sha: ${{ github.sha }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
