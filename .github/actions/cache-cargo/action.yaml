---
name: Cache Cargo
description: Cache Rust cargo registry, git sources, and build target directory.

inputs:
  cache-key-prefix:
    description: "Cache key prefix to namespace caches (e.g. ci, cd-testnet)"
    required: false
    default: "cargo"

runs:
  using: composite
  steps:
    - id: cache_cargo
      name: Cache Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target/
        key: ${{ inputs.cache-key-prefix }}-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ inputs.cache-key-prefix }}-${{ runner.os }}-
