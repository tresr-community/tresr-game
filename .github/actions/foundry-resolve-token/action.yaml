---
name: Foundry Resolve Token
description: >-
  Detect token deploy mode (skip/deploy) using per-contract bytecode checks
  via foundry-check-contract, execute deployment, and resolve final addresses.
  Handles both RonToken and TresrFaucet (testnet only).

inputs:
  rpc-url:
    description: "RPC URL"
    required: true
  chain-id:
    description: "Chain ID"
    required: true
  token-address:
    description: "Existing token address (from config)"
    required: true
  faucet-address:
    description: "Existing faucet address (from config)"
    required: true
  deployer-private-key:
    description: "Deployer wallet private key"
    required: true
  snowtrace-api-key:
    description: "Snowtrace API key"
    required: true

outputs:
  token_address:
    description: "Resolved token address"
    value: ${{ steps.resolve_token_address.outputs.token_address }}
  faucet_address:
    description: "Resolved faucet address"
    value: ${{ steps.resolve_faucet_address.outputs.faucet_address }}
  mode:
    description: "Token deploy mode (skip/deploy)"
    value: ${{ steps.decide_mode.outputs.mode }}
  deployed:
    description: "Whether a deployment was executed (true/false)"
    value: ${{ steps.decide_mode.outputs.deployed }}

runs:
  using: composite
  steps:
    # ──────────────────────────────────────────────
    # Per-contract bytecode checks
    # ──────────────────────────────────────────────
    - id: check_token
      name: Check RonToken
      uses: ./.github/actions/foundry-check-contract
      with:
        contract-name: RonToken
        artifact-path: out/Token.sol/RonToken.json
        on-chain-address: ${{ inputs.token-address }}
        rpc-url: ${{ inputs.rpc-url }}

    - id: check_faucet
      name: Check TresrFaucet
      uses: ./.github/actions/foundry-check-contract
      with:
        contract-name: TresrFaucet
        artifact-path: out/Faucet.sol/TresrFaucet.json
        on-chain-address: ${{ inputs.faucet-address }}
        rpc-url: ${{ inputs.rpc-url }}

    # ──────────────────────────────────────────────
    # Decide mode: skip if all match, else dry-run gate
    # ──────────────────────────────────────────────
    - id: decide_mode
      name: Decide Token Deploy Mode
      shell: devenv shell --quiet bash -- -e {0}
      env:
        RPC_URL: ${{ inputs.rpc-url }}
        DEPLOYER_PRIVATE_KEY: ${{ inputs.deployer-private-key }}
        TOKEN_CHANGED: ${{ steps.check_token.outputs.changed }}
        FAUCET_CHANGED: ${{ steps.check_faucet.outputs.changed }}
        TOKEN_ROW: ${{ steps.check_token.outputs.row }}
        FAUCET_ROW: ${{ steps.check_faucet.outputs.row }}
      run: |
        cd contracts

        # ──────────────────────────────────────────────
        # Write complete token bytecode check table in ONE contiguous block.
        # GitHub GFM requires header+separator+rows to be adjacent — split
        # writes across steps break the table into raw pipe-text.
        # ──────────────────────────────────────────────
        {
          echo "## 📦 Token Contract Bytecode Check"
          echo ""
          echo "| Contract | Address | Bytecode |"
          echo "|---|---|---|"
          echo "$TOKEN_ROW"
          echo "$FAUCET_ROW"
        } >> "$GITHUB_STEP_SUMMARY"


        # ──────────────────────────────────────────────
        # All contracts match on-chain → skip
        # ──────────────────────────────────────────────
        if [[ "$TOKEN_CHANGED" != "true" && "$FAUCET_CHANGED" != "true" ]]; then
          echo "✅ All token contracts match on-chain — no deploy needed"
          echo "mode=skip"    >> "$GITHUB_OUTPUT"
          echo "deployed=false" >> "$GITHUB_OUTPUT"
          {
            echo ""
            echo "→ **mode: skip** — no deployment needed"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        echo "⚡ One or more contracts changed — running dry-run gate..."

        # ──────────────────────────────────────────────
        # Forge dry-run gate: verify actual transactions would be broadcast
        # Prevents false-positive deploys from metadata-only differences
        # that survive stripping (e.g. compiler flag changes).
        # ──────────────────────────────────────────────
        DRY_RUN_LOG=$(mktemp)

        set +e
        set -o pipefail
        forge script script/DeployToken.s.sol:DeployTestToken \
          --rpc-url "$RPC_URL" \
          --skip-simulation \
          -vvvv 2>&1 | tee "$DRY_RUN_LOG"
        DRY_EXIT=$?
        set +o pipefail
        set -e

        if [[ $DRY_EXIT -eq 0 ]] && grep -qiE "(CREATE|CALL|Transactions)" "$DRY_RUN_LOG"; then
          echo "🆕 Token mode: DEPLOY (bytecode changed, dry-run confirmed transactions)"
          echo "mode=deploy"   >> "$GITHUB_OUTPUT"
          echo "deployed=true" >> "$GITHUB_OUTPUT"
          {
            echo ""
            echo "→ **mode: deploy** — dry-run confirmed new transactions"
          } >> "$GITHUB_STEP_SUMMARY"
        else
          echo "::warning::Bytecode differs but dry-run produced no transactions — skipping"
          echo "mode=skip"     >> "$GITHUB_OUTPUT"
          echo "deployed=false" >> "$GITHUB_OUTPUT"
          {
            echo ""
            echo "→ **mode: skip** — dry-run produced no transactions (metadata-only change)"
          } >> "$GITHUB_STEP_SUMMARY"
        fi

        rm -f "$DRY_RUN_LOG"

    # ──────────────────────────────────────────────
    # Execute deployment (only if mode=deploy)
    # ──────────────────────────────────────────────
    - id: deploy_token
      name: Deploy Test Token + Faucet
      if: steps.decide_mode.outputs.mode == 'deploy'
      continue-on-error: true
      shell: devenv shell --quiet bash -- -e {0}
      env:
        SNOWTRACE_API_KEY: ${{ inputs.snowtrace-api-key }}
      run: |
        cd contracts
        forge script script/DeployToken.s.sol:DeployTestToken \
          --rpc-url ${{ inputs.rpc-url }} \
          --broadcast \
          --slow \
          --skip-simulation \
          --verify \
          --etherscan-api-key "$SNOWTRACE_API_KEY" \
          -vvvv

    # ──────────────────────────────────────────────
    # Resolve final addresses
    # ──────────────────────────────────────────────
    - id: resolve_token_address
      name: Resolve Token Address
      if: always()
      shell: bash
      run: |
        CHAIN_ID="${{ inputs.chain-id }}"
        CONFIG_TOKEN="${{ inputs.token-address }}"
        ZERO="0x0000000000000000000000000000000000000000"
        DEPLOYED_TOKEN=""

        LATEST="contracts/broadcast/DeployToken.s.sol/${CHAIN_ID}/run-latest.json"
        if [[ -f "$LATEST" ]]; then
          DEPLOYED_TOKEN=$(jq -r \
            '.transactions[] | select(.transactionType == "CREATE" and .contractName == "RonToken") | .contractAddress' \
            "$LATEST" 2>/dev/null | head -1)
        fi

        if [[ -n "$DEPLOYED_TOKEN" ]]; then
          echo "token_address=${DEPLOYED_TOKEN}" >> "$GITHUB_OUTPUT"
          echo "🔗 Using freshly-deployed token: ${DEPLOYED_TOKEN}"
        elif [[ -n "$CONFIG_TOKEN" && "$CONFIG_TOKEN" != "$ZERO" ]]; then
          echo "token_address=${CONFIG_TOKEN}" >> "$GITHUB_OUTPUT"
          echo "🔗 Using config token: ${CONFIG_TOKEN}"
        else
          echo "token_address=" >> "$GITHUB_OUTPUT"
          echo "No token deployed this run"
        fi

    - id: resolve_faucet_address
      name: Resolve Faucet Address
      if: always()
      shell: bash
      run: |
        CHAIN_ID="${{ inputs.chain-id }}"
        CONFIG_FAUCET="${{ inputs.faucet-address }}"
        ZERO="0x0000000000000000000000000000000000000000"
        DEPLOYED_FAUCET=""

        LATEST="contracts/broadcast/DeployToken.s.sol/${CHAIN_ID}/run-latest.json"
        if [[ -f "$LATEST" ]]; then
          DEPLOYED_FAUCET=$(jq -r \
            '.transactions[] | select(.transactionType == "CREATE" and .contractName == "TresrFaucet") | .contractAddress' \
            "$LATEST" 2>/dev/null | head -1)
        fi

        if [[ -n "$DEPLOYED_FAUCET" ]]; then
          echo "faucet_address=${DEPLOYED_FAUCET}" >> "$GITHUB_OUTPUT"
          echo "🔗 Using freshly-deployed faucet: ${DEPLOYED_FAUCET}"
        elif [[ -n "$CONFIG_FAUCET" && "$CONFIG_FAUCET" != "$ZERO" ]]; then
          echo "faucet_address=${CONFIG_FAUCET}" >> "$GITHUB_OUTPUT"
          echo "🔗 Using config faucet: ${CONFIG_FAUCET}"
        else
          echo "faucet_address=" >> "$GITHUB_OUTPUT"
          echo "No faucet deployed this run"
        fi

    - id: check_token_deploy
      name: Check Token Deploy
      if: always()
      shell: bash
      run: |
        OUTCOME="${{ steps.deploy_token.outcome }}"
        if [[ "$OUTCOME" == "failure" ]]; then
          echo "::error::Deploy Test Token failed"
          exit 1
        fi
        echo "✓ Deploy Test Token: ${OUTCOME:-n/a}"
